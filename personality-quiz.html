<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Personality Quizzes &middot; PokeQuiz</title>
	<meta name="author" content="Angelo Miguel G. Vinluan">
	<link rel="icon" type="image/png" href="Pictures/pokeball.png">
	<meta name="description" content="Which Pokémon are you? Which starter? Which type? Take a personality quiz and find out!">
	<meta property="og:type" content="website">
	<meta property="og:site_name" content="PokeQuiz">
	<meta property="og:title" content="Personality Quizzes — PokeQuiz">
	<meta property="og:description" content="Which starter are you? Which type? Take a personality quiz and find out!">
	<meta property="og:image" content="https://poke-quiz-chi.vercel.app/Pictures/pokeball.png">
	<meta property="og:url" content="https://poke-quiz-chi.vercel.app/personality-quiz">
	<meta name="twitter:card" content="summary">
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#ee1515">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700;800&display=swap">
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/personality-quiz.css?v=7">
    <script defer src="js/theme.js?v=1"></script>
</head>
<body class="pq-body">

<header class="site-header">
	<a href="index.html" class="brand-link"><h1 class="brand">PokeQuiz</h1></a>
	<nav>
		<a href="index.html">Home</a>
		<a href="play.html">Play</a>
		<a href="quizzes.html">Quizzes</a>
		<a href="puzzle.html">Puzzles</a>
		<a href="ranking.html">Leaderboard</a>
		<a href="camp.html">Camp</a>
	</nav>
	<div class="profile-wrap">
		<button class="profile-btn" aria-haspopup="true" aria-expanded="false" type="button">
			<img class="profile-avatar" src="Pictures/pokeball.png" alt="">
			<span class="profile-name">Trainer</span>
		</button>
		<div class="profile-panel" hidden role="dialog" aria-label="Trainer profile">
			<div class="pp-title">Trainer Profile</div>
			<div class="pp-row"><span class="pp-row-label">Name</span><span class="pp-name-view">&mdash;</span></div>
			<div class="pp-row"><span class="pp-row-label">Best Score</span><span class="pp-score-view">&mdash;</span></div>
			<div class="pp-edit-form" hidden>
				<input class="pp-input" type="text" maxlength="24" placeholder="Your name">
				<button class="pp-mini-btn pp-save-btn" type="button">Save</button>
				<button class="pp-mini-btn pp-secondary pp-cancel-btn" type="button">Cancel</button>
			</div>
			<div class="pp-actions">
				<button class="pp-edit-btn" type="button">Edit Name</button>
				<button class="pp-clear-btn" type="button">Clear Data</button>
			</div>
		</div>
	</div>
</header>

<main class="pq-main">

	<!-- ════════════════════════════════════════
	     SELECTION SCREEN
	════════════════════════════════════════ -->
	<div id="pq-selection">
		<header class="pq-sel-header">
			<p class="pq-sel-eyebrow">✨ Just for Fun</p>
			<h1 class="pq-sel-title">Personality Quizzes</h1>
			<p class="pq-sel-sub">No right or wrong answers. Pick a quiz and find out which Pok&eacute;mon you truly are.</p>
		</header>

		<div class="pq-type-grid" id="pq-type-grid">
			<!-- injected by JS -->
		</div>
	</div>

	<!-- ════════════════════════════════════════
	     QUIZ RUNNER
	════════════════════════════════════════ -->
	<div id="pq-runner" hidden>
		<div class="pq-card" id="pq-card">

			<!-- Coloured topbar with label + counter -->
			<div class="pq-topbar" id="pq-topbar">
				<span class="pq-topbar-label" id="pq-topbar-label">QUIZ</span>
				<span class="pq-topbar-counter" id="pq-topbar-counter">0 / ?</span>
			</div>

			<!-- XP-style progress bar -->
			<div class="pq-xp-wrap" id="pq-xp-wrap">
				<div class="pq-xp-track">
					<div class="pq-xp-fill" id="pq-xp-fill" style="width:0%"></div>
				</div>
			</div>

			<!-- Live affinity meter — appears after first answer -->
			<div class="pq-live-meter" id="pq-live-meter" hidden>
				<span class="pq-live-label">LEADING</span>
				<div class="pq-live-cands" id="pq-live-cands"></div>
			</div>

			<!-- Question -->
			<div class="pq-question-area pq-slide" id="pq-question-area">
				<span class="pq-q-num" id="pq-q-num"></span>
				<p class="pq-q-text" id="pq-q-text"></p>
			</div>

			<!-- Answers -->
			<div class="pq-answers pq-slide" id="pq-answers"></div>

			<!-- Controls -->
			<div class="pq-next-wrap" id="pq-next-wrap">
				<button class="pq-back-link" id="pq-back-btn">&#8592; Change quiz</button>
				<button class="pq-next-btn" id="pq-next-btn" disabled>NEXT &#8594;</button>
			</div>

			<!-- Loading (inside card) -->
			<div id="pq-loading" class="pq-loading" hidden>
				<div class="pq-loading-ball" id="pq-loading-ball"></div>
				<p class="pq-loading-text">Finding your match<span class="pq-loading-dots"><span>.</span><span>.</span><span>.</span></span></p>
			</div>

			<!-- Result (inside card) -->
			<div id="pq-result" hidden></div>
		</div>
	</div>

</main>

<footer>Made with care by Angelo Miguel G. Vinluan</footer>
<div class="pq-confetti" id="pq-confetti" aria-hidden="true"></div>

<script src="js/util.js" defer></script>
<script src="js/profile.js" defer></script>
<script src="js/personality-data.js?v=4"></script>
<script>
(function () {
  'use strict';

  var DATA       = window.PERSONALITY_DATA;
  var QUIZZES    = DATA.quizzes;
  var QUIZ_ORDER = ['starter', 'type', 'kanto'];

  /* ── Asset URL helpers ─────────────────────────────────────── */
  function SPRITE_URL(id)  { return 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/' + id + '.png'; }
  function ARTWORK_URL(id) { return 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/' + id + '.png'; }
  function TYPE_BADGE_URL(typeId) { return 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/types/generation-ix/scarlet-violet/' + typeId + '.png'; }

  /* ── Color helpers ────────────────────────────────────────── */
  function hexToRgb(hex) {
    var h = hex.replace('#', '');
    if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    return {
      r: parseInt(h.slice(0, 2), 16),
      g: parseInt(h.slice(2, 4), 16),
      b: parseInt(h.slice(4, 6), 16)
    };
  }

  function applyResultColors(color) {
    var rgb = hexToRgb(color);
    var tint8  = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',0.08)';
    var tint25 = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',0.25)';
    /* Page background: stronger radial glow centered behind the card */
    document.body.style.backgroundImage =
      'radial-gradient(ellipse 100% 60% at 50% 36%, ' + tint25 + ' 0%, transparent 72%),' +
      'radial-gradient(circle, rgba(0,0,0,0.055) 1px, transparent 1px)';
    document.body.style.backgroundSize = 'auto, 20px 20px';
    /* Card border accent */
    elCard.style.borderColor = color;
    elCard.style.boxShadow   = '5px 5px 0 ' + color;
    /* Result body wash */
    document.body.style.setProperty('--pq-result-tint', tint8);
  }

  /* Generate a banner gradient from the winner's type color */
  function winnerBannerGrad(color) {
    var rgb = hexToRgb(color);
    var dark = {
      r: Math.max(0, rgb.r - 55),
      g: Math.max(0, rgb.g - 55),
      b: Math.max(0, rgb.b - 55)
    };
    return 'linear-gradient(160deg, rgb(' +
      rgb.r + ',' + rgb.g + ',' + rgb.b + ') 0%, rgb(' +
      dark.r + ',' + dark.g + ',' + dark.b + ') 100%)';
  }

  function resetColors() {
    document.body.style.backgroundImage = '';
    document.body.style.backgroundSize  = '';
    elCard.style.borderColor = '';
    elCard.style.boxShadow   = '';
    document.body.style.removeProperty('--pq-result-tint');
  }

  /* ── Elements ─────────────────────────────────────────────── */
  var elSel      = document.getElementById('pq-selection');
  var elRunner   = document.getElementById('pq-runner');
  var elCard     = document.getElementById('pq-card');
  var elTopbar   = document.getElementById('pq-topbar');
  var elTopLabel = document.getElementById('pq-topbar-label');
  var elTopCtr   = document.getElementById('pq-topbar-counter');
  var elXpFill   = document.getElementById('pq-xp-fill');
  var elXpWrap   = document.getElementById('pq-xp-wrap');
  var elQNum     = document.getElementById('pq-q-num');
  var elQText    = document.getElementById('pq-q-text');
  var elAnswers  = document.getElementById('pq-answers');
  var elNext     = document.getElementById('pq-next-btn');
  var elNextWrap = document.getElementById('pq-next-wrap');
  var elBack     = document.getElementById('pq-back-btn');
  var elLoading   = document.getElementById('pq-loading');
  var elLoadBall  = document.getElementById('pq-loading-ball');
  var elLiveMeter = document.getElementById('pq-live-meter');
  var elLiveCands = document.getElementById('pq-live-cands');
  var elResult   = document.getElementById('pq-result');
  var elQArea    = document.getElementById('pq-question-area');
  var elGrid     = document.getElementById('pq-type-grid');
  var elConfetti = document.getElementById('pq-confetti');

  /* ── Quiz state ───────────────────────────────────────────── */
  var activeQuiz  = null;
  var scores      = {};
  var currentQ    = 0;
  var selectedIdx = null;

  /* ── Build selection grid ─────────────────────────────────── */
  elGrid.innerHTML = QUIZ_ORDER.map(function(id) {
    var q = QUIZZES[id];

    /* Hero sprites / type icons */
    var showcaseHtml = '';
    if (q.showcasePokemon) {
      showcaseHtml = q.showcasePokemon.map(function(pid) {
        return '<img class="pq-hub-sprite" src="' + SPRITE_URL(pid) + '" alt="" loading="lazy">';
      }).join('');
    } else if (q.showcaseTypeIds) {
      showcaseHtml = q.showcaseTypeIds.map(function(tid) {
        return '<img class="pq-hub-type-icon" src="' + TYPE_BADGE_URL(tid) + '" alt="" loading="lazy">';
      }).join('');
    }

    return '<a class="pq-type-card" style="--card-color:' + q.color + '" href="personality-quiz.html?quiz=' + id + '" data-quiz="' + id + '">' +
      '<div class="pq-card-hero">' +
        '<span class="pq-card-hero-label">' + esc(q.label || q.name) + '</span>' +
        '<div class="pq-card-hero-sprites">' + showcaseHtml + '</div>' +
      '</div>' +
      '<div class="pq-type-card-body">' +
        '<div class="pq-type-card-info">' +
          '<p class="pq-type-card-name">' + esc(q.name) + '</p>' +
          '<p class="pq-type-card-desc">' + esc(q.desc) + '</p>' +
          '<div class="pq-type-card-chips">' +
            q.subtitle.split(' · ').map(function(c){ return '<span class="pq-type-chip">' + esc(c) + '</span>'; }).join('') +
          '</div>' +
        '</div>' +
        '<span class="pq-type-card-arrow">&#8594;</span>' +
      '</div>' +
    '</a>';
  }).join('');

  /* Intercept clicks to run quiz in-page instead of navigating */
  elGrid.addEventListener('click', function(e) {
    var card = e.target.closest('.pq-type-card');
    if (!card) return;
    e.preventDefault();
    startQuiz(card.dataset.quiz);
  });

  /* ── Deep-link ?quiz= ────────────────────────────────────── */
  var qs       = new URLSearchParams(window.location.search);
  var deepLink = qs.get('quiz');
  if (deepLink && QUIZZES[deepLink]) startQuiz(deepLink);

  /* ── Live affinity meter ─────────────────────────────────── */
  function updateLiveMeter(currentScores) {
    var ranked = Object.keys(currentScores)
      .filter(function(k) { return currentScores[k] > 0; })
      .sort(function(a, b) { return currentScores[b] - currentScores[a]; });
    if (!ranked.length) return;

    var isType = activeQuiz.id === 'type';
    var top2   = ranked.slice(0, 2);
    var prev   = elLiveCands.querySelector('.pq-live-leader');
    var prevKey = prev ? prev.dataset.key : null;

    elLiveCands.innerHTML = top2.map(function(key, i) {
      var pok    = activeQuiz.pokemon[key];
      var label  = isType ? pok.typeName : pok.name;
      var isLeader = i === 0;
      var changed  = isLeader && key !== prevKey && prevKey !== null;

      var imgHtml = isType
        ? '<img class="pq-live-img pq-live-type" src="' + TYPE_BADGE_URL(pok.typeId) + '" alt="">'
        : '<img class="pq-live-img pq-live-sprite" src="' + SPRITE_URL(pok.id) + '" alt="">';

      return '<div class="pq-live-cand' +
        (isLeader ? ' pq-live-leader' : ' pq-live-second') +
        (changed  ? ' pq-live-changed' : '') +
        '" data-key="' + key + '" style="--cand-color:' + pok.color + '">' +
        imgHtml +
        '<span class="pq-live-name">' + esc(label) + '</span>' +
      '</div>';
    }).join('<span class="pq-live-vs">vs</span>');

    elLiveMeter.hidden = false;
  }

  /* ── Start a quiz ─────────────────────────────────────────── */
  function startQuiz(id) {
    resetColors();
    activeQuiz  = QUIZZES[id];
    scores      = {};
    currentQ    = 0;
    selectedIdx = null;

    Object.keys(activeQuiz.pokemon).forEach(function(k) { scores[k] = 0; });

    /* Apply quiz color vars */
    elCard.style.setProperty('--quiz-color', activeQuiz.color);
    elCard.style.setProperty('--quiz-gradient', activeQuiz.gradient);
    elTopbar.style.background = activeQuiz.color;
    elLoadBall.style.setProperty('--quiz-color', activeQuiz.color);
    elXpFill.style.background = activeQuiz.color;
    elTopLabel.textContent = activeQuiz.label || activeQuiz.name.toUpperCase();

    /* Reset sub-panels */
    elLoading.hidden    = true;
    elResult.hidden     = true;
    elLiveMeter.hidden  = true;
    elLiveCands.innerHTML = '';
    showQuizContent(true);

    elSel.hidden    = true;
    elRunner.hidden = false;

    renderQuestion(0);
  }

  /* ── Show/hide quiz content panels ───────────────────────── */
  function showQuizContent(show) {
    elTopbar.hidden   = !show;
    elXpWrap.hidden   = !show;
    elQArea.hidden    = !show;
    elAnswers.hidden  = !show;
    elNextWrap.hidden = !show;
    if (!show) elLiveMeter.hidden = true;
  }

  /* ── Render question ──────────────────────────────────────── */
  function renderQuestion(idx) {
    selectedIdx     = null;
    elNext.disabled = true;

    var q   = activeQuiz.questions[idx];
    var tot = activeQuiz.questions.length;
    var pct = (idx / tot) * 100;

    elXpFill.style.width  = pct + '%';
    elTopCtr.textContent  = (idx + 1) + ' / ' + tot;
    elQNum.textContent    = 'Question ' + (idx + 1) + ' of ' + tot;
    elNext.textContent    = (idx === tot - 1) ? 'SEE RESULT ✨' : 'NEXT →';

    /* Slide animation */
    elQArea.classList.remove('pq-slide');
    elAnswers.classList.remove('pq-slide');
    void elQArea.offsetWidth;
    elQArea.classList.add('pq-slide');
    elAnswers.classList.add('pq-slide');

    elQText.textContent = q.text;

    elAnswers.innerHTML = q.answers.map(function(a, i) {
      return '<button class="pq-answer" data-idx="' + i + '">' +
        '<span class="pq-cursor">&#9654;</span>' +
        '<span class="pq-answer-emoji">' + (a.emoji || '') + '</span>' +
        '<span class="pq-answer-text">' + esc(a.text) + '</span>' +
      '</button>';
    }).join('');

    elAnswers.querySelectorAll('.pq-answer').forEach(function(btn) {
      btn.addEventListener('click', function() {
        elAnswers.querySelectorAll('.pq-answer').forEach(function(b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
        selectedIdx     = parseInt(btn.dataset.idx, 10);
        elNext.disabled = false;
      });
    });
  }

  /* ── Next ─────────────────────────────────────────────────── */
  elNext.addEventListener('click', function() {
    if (selectedIdx === null) return;

    var answer = activeQuiz.questions[currentQ].answers[selectedIdx];
    Object.keys(answer.weights).forEach(function(pk) {
      scores[pk] = (scores[pk] || 0) + answer.weights[pk];
    });

    currentQ++;

    if (currentQ < activeQuiz.questions.length) {
      updateLiveMeter(scores);
      renderQuestion(currentQ);
    } else {
      showQuizContent(false);
      elLoading.hidden = false;
      setTimeout(showResult, 1700);
    }
  });

  /* ── Back to selection ────────────────────────────────────── */
  elBack.addEventListener('click', function() {
    resetColors();
    elRunner.hidden  = true;
    elSel.hidden     = false;
    showQuizContent(true);
    elLoading.hidden = true;
    elResult.hidden  = true;
  });

  /* ── Show result ──────────────────────────────────────────── */
  function showResult() {
    elLoading.hidden = false;

    /* Progress: full */
    elXpFill.style.width  = '100%';
    elTopCtr.textContent  = activeQuiz.questions.length + ' / ' + activeQuiz.questions.length;

    /* Rank results */
    var ranked  = Object.keys(scores).sort(function(a, b) { return scores[b] - scores[a]; });
    var winKey  = ranked[0];
    var winner  = activeQuiz.pokemon[winKey];
    var isType  = activeQuiz.id === 'type';

    /* Hero image */
    var heroHtml;
    if (isType) {
      heroHtml = '<img class="pq-result-type-hero" src="' + TYPE_BADGE_URL(winner.typeId) + '" alt="' + esc(winner.typeName) + ' type">';
    } else {
      heroHtml = '<div class="pq-result-art-wrap">' +
        '<img src="' + ARTWORK_URL(winner.id) + '" alt="' + esc(winner.name) + '" ' +
          'onerror="this.src=\'' + SPRITE_URL(winner.id) + '\'">' +
      '</div>';
    }

    /* Type badge — PokeAPI image for all quizzes */
    var badgeHtml;
    if (winner.typeId) {
      badgeHtml = '<img class="pq-type-badge-img" src="' + TYPE_BADGE_URL(winner.typeId) + '" alt="' + esc(isType ? winner.typeName : winner.type) + ' type">';
    } else {
      var badgeLabel = isType ? (winner.icon + ' ' + winner.typeName) : (winner.type + ' Type');
      badgeHtml = '<span class="pq-result-type-badge" style="--res-color:' + winner.color + ';background:' + winner.color + '">' + esc(badgeLabel) + '</span>';
    }

    var traitsHtml = (winner.traits || []).map(function(t) {
      return '<span class="pq-result-trait">' + esc(t) + '</span>';
    }).join('');

    var nameLabel = isType ? (winner.typeName + ' Type') : winner.name;

    /* Signature move + ideal partner */
    var statsHtml = '';
    if (winner.signatureMove || winner.idealPartner) {
      statsHtml = '<div class="pq-result-stats">';
      if (winner.signatureMove) {
        statsHtml += '<div class="pq-result-stat">' +
          '<span class="pq-result-stat-label">⚔️ SIGNATURE MOVE</span>' +
          '<span class="pq-result-stat-value">' + esc(winner.signatureMove) + '</span>' +
        '</div>';
      }
      if (winner.idealPartner) {
        statsHtml += '<div class="pq-result-stat">' +
          '<span class="pq-result-stat-label">🤝 IDEAL PARTNER</span>' +
          '<span class="pq-result-stat-value">' + esc(winner.idealPartner) + '</span>' +
        '</div>';
      }
      statsHtml += '</div>';
    }

    /* ── Affinity chart — top 5 scored results ── */
    var topKeys  = ranked.slice(0, 5);
    var maxScore = scores[topKeys[0]] || 1;

    var chartRows = topKeys.map(function(key, i) {
      var pok      = activeQuiz.pokemon[key];
      var pct      = Math.round((scores[key] / maxScore) * 100);
      var isWinner = i === 0;
      var barColor = pok.color || winner.color;
      var label    = isType ? pok.typeName : pok.name;

      var visHtml;
      if (isType) {
        visHtml = pok.typeId
          ? '<img class="pq-aff-img pq-aff-type" src="' + TYPE_BADGE_URL(pok.typeId) + '" alt="">'
          : '<span class="pq-aff-icon">' + (pok.icon || '') + '</span>';
      } else {
        visHtml = '<img class="pq-aff-img pq-aff-sprite" src="' + SPRITE_URL(pok.id) + '" alt="">';
      }

      return '<div class="pq-aff-row' + (isWinner ? ' pq-aff-winner' : '') + '">' +
        '<div class="pq-aff-vis">' + visHtml + '</div>' +
        '<span class="pq-aff-name">' + esc(label) + (isWinner ? ' 👑' : '') + '</span>' +
        '<div class="pq-aff-bar-wrap">' +
          '<div class="pq-aff-bar" data-pct="' + pct + '" style="width:0%;background:' + barColor + '"></div>' +
        '</div>' +
        '<span class="pq-aff-pct">' + pct + '%</span>' +
      '</div>';
    }).join('');

    var chartHtml =
      '<div class="pq-affinity-chart">' +
        '<p class="pq-affinity-label">YOUR AFFINITY</p>' +
        chartRows +
      '</div>';

    elResult.innerHTML =
      '<div class="pq-result-banner" style="background:' + winnerBannerGrad(winner.color) + '">' +
        '<p class="pq-result-eyebrow">You are&hellip;</p>' +
        heroHtml +
      '</div>' +
      '<div class="pq-result-body" style="--res-color:' + winner.color + '">' +
        '<h2 class="pq-result-name">' + esc(nameLabel) + '</h2>' +
        badgeHtml +
        (traitsHtml ? '<div class="pq-result-traits">' + traitsHtml + '</div>' : '') +
        '<p class="pq-result-desc">' + esc(winner.desc) + '</p>' +
        statsHtml +
        chartHtml +
        '<div class="pq-result-actions">' +
          '<button class="pq-btn pq-btn-primary" id="pq-replay-btn" style="--res-color:' + winner.color + ';background:' + winner.color + '">&#8635; PLAY AGAIN</button>' +
          '<button class="pq-btn pq-btn-secondary" id="pq-try-other-btn">TRY ANOTHER</button>' +
        '</div>' +
      '</div>';

    elLoading.hidden = true;
    elResult.hidden  = false;

    /* Animate bars in after the card fades up */
    setTimeout(function() {
      elResult.querySelectorAll('.pq-aff-bar').forEach(function(bar) {
        bar.style.width = bar.dataset.pct + '%';
      });
    }, 420);

    document.getElementById('pq-replay-btn').addEventListener('click', function() {
      elResult.hidden = true;
      startQuiz(activeQuiz.id);
    });

    document.getElementById('pq-try-other-btn').addEventListener('click', function() {
      elResult.hidden  = true;
      elRunner.hidden  = true;
      elSel.hidden     = false;
      showQuizContent(true);
    });

    applyResultColors(winner.color);
    spawnConfetti(winner.color);
  }

  /* ── Confetti ─────────────────────────────────────────────── */
  function spawnConfetti(base) {
    var colors = [base, '#ee1515', '#f7d02c', '#fff', '#a8d8ea'];
    for (var i = 0; i < 60; i++) {
      (function(i) {
        setTimeout(function() {
          var el  = document.createElement('div');
          el.className = 'pq-confetti-piece';
          var size = 6 + Math.random() * 9;
          el.style.cssText = [
            'left:' + (Math.random() * 100) + 'vw',
            'width:' + size + 'px',
            'height:' + size + 'px',
            'background:' + colors[Math.floor(Math.random() * colors.length)],
            'border-radius:' + (Math.random() > 0.5 ? '50%' : '2px'),
            'animation-duration:' + (1.5 + Math.random() * 2) + 's'
          ].join(';');
          elConfetti.appendChild(el);
          setTimeout(function() { if (el.parentNode) el.remove(); }, 3600);
        }, i * 26);
      })(i);
    }
  }

  /* ── Helpers ──────────────────────────────────────────────── */
  function esc(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

})();
</script>
