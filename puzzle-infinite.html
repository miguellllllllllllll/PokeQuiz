<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Infinite Streak &middot; PokeQuiz</title>
	<meta name="author" content="Angelo Miguel G. Vinluan">
	<link rel="icon" type="image/png" href="Pictures/pokeball.png">
	<meta name="description" content="Endless Pokémon trivia — one wrong answer ends your streak!">
	<meta property="og:type" content="website">
	<meta property="og:site_name" content="PokeQuiz">
	<meta property="og:title" content="Infinite Streak — PokeQuiz">
	<meta property="og:description" content="Endless Pokémon trivia — one wrong answer ends your streak!">
	<meta property="og:image" content="https://poke-quiz-chi.vercel.app/Pictures/pokeball.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700;800&display=swap">
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/puzzle.css">
	<style>
		.inf-card {
			max-width: 620px;
			margin: 0 auto;
			padding: 32px;
			position: relative;
			overflow: hidden;
		}
		.inf-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 24px;
			flex-wrap: wrap;
			gap: 10px;
		}
		.inf-streak {
			font-family: 'Press Start 2P', monospace;
			font-size: 32px;
			color: var(--poke-red);
			text-shadow: 3px 3px 0 var(--poke-black);
			display: flex;
			align-items: center;
			gap: 8px;
		}
		.inf-streak-num { transition: transform 0.2s; }
		.inf-streak-num.bump { transform: scale(1.3); }
		.inf-best {
			font-size: 12px;
			color: #888;
			text-align: right;
		}
		.inf-best strong { color: var(--poke-red); display: block; font-size: 14px; }
		.inf-question-num {
			font-family: 'Press Start 2P', monospace;
			font-size: 10px;
			color: var(--poke-red);
			letter-spacing: 1.5px;
			margin-bottom: 10px;
		}
		.inf-question {
			font-size: 20px;
			font-weight: 700;
			line-height: 1.4;
			margin-bottom: 20px;
			color: var(--poke-black);
		}
		.inf-answers {
			display: grid;
			gap: 10px;
			margin-bottom: 20px;
		}
		.inf-answer {
			display: grid;
			grid-template-columns: 36px 1fr;
			align-items: center;
			gap: 14px;
			padding: 14px 18px;
			background: #fff;
			border: 2px solid #ede5e5;
			border-radius: 14px;
			cursor: pointer;
			transition: border-color 0.15s, background 0.15s, transform 0.05s;
			font-size: 15px;
			font-weight: 500;
		}
		.inf-answer:hover:not(.locked) {
			border-color: var(--poke-red);
			background: #fffafa;
			transform: translateX(2px);
		}
		.inf-answer.locked { cursor: default; }
		.inf-answer.correct {
			border-color: #22c55e;
			background: rgba(34,197,94,0.12);
		}
		.inf-answer.wrong {
			border-color: #ef4444;
			background: rgba(239,68,68,0.1);
		}
		.inf-letter {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 32px;
			height: 32px;
			border-radius: 50%;
			background: linear-gradient(180deg, #2a2a2a, #000);
			color: var(--poke-yellow);
			font-weight: 700;
			font-size: 12px;
			font-family: 'Press Start 2P', monospace;
			border: 2px solid var(--poke-yellow);
		}
		.inf-answer.correct .inf-letter {
			background: linear-gradient(180deg, #22c55e, #16a34a);
			border-color: #14532d;
			color: #fff;
		}
		.inf-answer.wrong .inf-letter {
			background: linear-gradient(180deg, #ef4444, #dc2626);
			border-color: #7f1d1d;
			color: #fff;
		}
		.inf-feedback {
			min-height: 36px;
			font-family: 'Press Start 2P', monospace;
			font-size: 11px;
			text-align: center;
			color: #22c55e;
			margin-bottom: 8px;
		}
		.inf-feedback.bad { color: #ef4444; }
		/* Game over */
		.inf-gameover {
			text-align: center;
			padding: 32px;
			display: none;
		}
		.inf-gameover-skull {
			font-size: 56px;
			margin-bottom: 12px;
			filter: drop-shadow(0 0 16px rgba(255,0,0,0.5));
			animation: nuzPulse 1.2s ease-in-out infinite alternate;
		}
		@keyframes nuzPulse {
			from { transform: scale(1); }
			to { transform: scale(1.08); }
		}
		.inf-gameover h2 {
			font-family: 'Press Start 2P', monospace;
			font-size: 18px;
			color: var(--poke-red);
			text-shadow: 2px 2px 0 var(--poke-black);
			margin-bottom: 8px;
		}
		.inf-final-streak {
			font-family: 'Press Start 2P', monospace;
			font-size: 48px;
			color: var(--poke-red);
			text-shadow: 4px 4px 0 var(--poke-black);
			margin: 8px 0;
		}
		.inf-token-grant {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 8px 18px;
			background: rgba(234,179,8,0.12);
			border: 1.5px solid rgba(234,179,8,0.45);
			border-radius: 10px;
			font-size: 13px;
			font-weight: 700;
			color: #92400e;
			margin: 12px 0;
		}
		.inf-new-best {
			font-family: 'Press Start 2P', monospace;
			font-size: 11px;
			color: var(--poke-yellow);
			background: var(--poke-black);
			padding: 6px 14px;
			border-radius: 999px;
			margin-bottom: 10px;
			display: inline-block;
		}
		.inf-actions {
			display: flex;
			gap: 10px;
			justify-content: center;
			flex-wrap: wrap;
			margin-top: 14px;
		}
	</style>
</head>
<body>
	<header class="site-header">
		<a href="index.html" class="brand-link"><h1 class="brand">PokeQuiz</h1></a>
		<nav>
			<a href="index.html">Home</a>
			<a href="play.html">Play</a>
			<a href="quizzes.html">Quizzes</a>
			<a href="puzzle.html" class="active">Puzzles</a>
			<a href="ranking.html">Leaderboard</a>
			<a href="camp.html">Camp</a>
		</nav>
		<div class="profile-wrap">
			<button class="profile-btn" aria-haspopup="true" aria-expanded="false" type="button">
				<img class="profile-avatar" src="Pictures/pokeball.png" alt="">
				<span class="profile-name">Trainer</span>
			</button>
			<div class="profile-panel" hidden role="dialog" aria-label="Trainer profile">
				<div class="pp-title">Trainer Profile</div>
				<div class="pp-row"><span class="pp-row-label">Name</span><span class="pp-name-view">&mdash;</span></div>
				<div class="pp-row"><span class="pp-row-label">Best Score</span><span class="pp-score-view">&mdash;</span></div>
				<div class="pp-edit-form" hidden>
					<input class="pp-input" type="text" maxlength="24" placeholder="Your name">
					<button class="pp-mini-btn pp-save-btn" type="button">Save</button>
					<button class="pp-mini-btn pp-secondary pp-cancel-btn" type="button">Cancel</button>
				</div>
				<div class="pp-actions">
					<button class="pp-edit-btn" type="button">Edit Name</button>
					<button class="pp-clear-btn" type="button">Clear Data</button>
				</div>
			</div>
		</div>
	</header>

	<main class="container">
		<section class="card inf-card">
			<div id="gameArea">
				<div class="inf-header">
					<div class="inf-streak">
						<span>&#128293;</span>
						<span class="inf-streak-num" id="streakNum">0</span>
					</div>
					<div class="inf-best">
						Best<strong id="bestDisplay">—</strong>
					</div>
				</div>
				<div id="questionArea">
					<div class="inf-question-num" id="infQNum">Question 1</div>
					<div class="inf-question" id="infQuestion">Loading&hellip;</div>
					<div class="inf-answers" id="infAnswers"></div>
					<div class="inf-feedback" id="infFeedback"></div>
				</div>
			</div>
			<div class="inf-gameover" id="gameOver">
				<div class="inf-gameover-skull">&#128128;</div>
				<h2>Game Over!</h2>
				<div style="font-size:15px;color:#555;margin-bottom:4px;">Your streak</div>
				<div class="inf-final-streak" id="finalStreak">0</div>
				<div id="newBestBadge" style="display:none" class="inf-new-best">&#11088; New Best!</div>
				<div class="inf-token-grant" id="tokenGrant"></div>
				<div class="inf-actions">
					<button class="btn" onclick="startGame()">Play Again</button>
					<a href="puzzle.html" class="btn btn-ghost">Back to Puzzles</a>
					<a href="camp.html" class="btn btn-secondary">Spend Tokens &#127957;&#65039;</a>
				</div>
			</div>
		</section>
	</main>

	<footer>Made with care by Angelo Miguel G. Vinluan</footer>

	<script src="js/util.js" defer></script>
	<script src="js/profile.js" defer></script>
	<script src="js/quizzes.js"></script>
	<script>
	(function() {
		const LETTERS = ['a','b','c','d'];

		function escapeHtml(s) {
			return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
		}

		function shuffle(arr) {
			const a = arr.slice();
			for (let i = a.length - 1; i > 0; i--) {
				const j = Math.floor(Math.random() * (i + 1));
				[a[i], a[j]] = [a[j], a[i]];
			}
			return a;
		}

		function getPlayerName() {
			try { return localStorage.getItem('playerName') || sessionStorage.getItem('playerName') || 'Trainer'; } catch { return 'Trainer'; }
		}

		function getPlayerId() {
			let id = '';
			try { id = localStorage.getItem('pokequiz_player_id') || ''; } catch {}
			if (!id) {
				id = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'id_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
				try { localStorage.setItem('pokequiz_player_id', id); } catch {}
			}
			return id;
		}

		function getBest() {
			try { return parseInt(localStorage.getItem('pokequiz_infinite_best') || '0', 10); } catch { return 0; }
		}

		function setBest(val) {
			try { localStorage.setItem('pokequiz_infinite_best', String(val)); } catch {}
		}

		function grantTokens(amount) {
			try {
				const inv = JSON.parse(localStorage.getItem('pokequiz_inventory') || '{}');
				if (typeof inv.tokens !== 'number') inv.tokens = 0;
				inv.tokens += amount;
				localStorage.setItem('pokequiz_inventory', JSON.stringify(inv));
				return inv.tokens;
			} catch { return 0; }
		}

		// Build flat question pool from all quizzes
		function buildPool() {
			const QUIZZES = window.POKEQUIZ_QUIZZES || {};
			let pool = [];
			Object.values(QUIZZES).forEach(quiz => {
				quiz.questions.forEach(q => {
					// Build answers array in uniform format
					const entries = Object.entries(q.answers);
					pool.push({ question: q.question, answers: entries, correctAnswer: q.correctAnswer });
				});
			});
			return pool;
		}

		let pool = [];
		let shuffledPool = [];
		let poolIndex = 0;
		let streak = 0;
		let answered = false;

		const streakNumEl = document.getElementById('streakNum');
		const bestDisplayEl = document.getElementById('bestDisplay');
		const infQNumEl = document.getElementById('infQNum');
		const infQuestionEl = document.getElementById('infQuestion');
		const infAnswersEl = document.getElementById('infAnswers');
		const infFeedbackEl = document.getElementById('infFeedback');
		const gameOverEl = document.getElementById('gameOver');
		const gameAreaEl = document.getElementById('gameArea');
		const finalStreakEl = document.getElementById('finalStreak');
		const newBestBadgeEl = document.getElementById('newBestBadge');
		const tokenGrantEl = document.getElementById('tokenGrant');

		function updateBestDisplay() {
			bestDisplayEl.textContent = getBest() || '—';
		}

		function nextQuestion() {
			if (poolIndex >= shuffledPool.length) {
				// Reshuffle
				shuffledPool = shuffle(pool);
				poolIndex = 0;
			}
			const q = shuffledPool[poolIndex++];
			answered = false;
			infFeedbackEl.textContent = '';
			infFeedbackEl.className = 'inf-feedback';
			infQNumEl.textContent = `Question ${streak + 1}`;
			infQuestionEl.textContent = q.question;

			infAnswersEl.innerHTML = q.answers.map(([letter, text], idx) => `
				<button class="inf-answer" data-letter="${escapeHtml(letter)}" data-correct="${escapeHtml(q.correctAnswer)}" onclick="handleAnswer(this, '${escapeHtml(letter)}', '${escapeHtml(q.correctAnswer)}')">
					<span class="inf-letter">${escapeHtml(letter.toUpperCase())}</span>
					<span>${escapeHtml(text)}</span>
				</button>
			`).join('');
		}

		window.handleAnswer = function(btn, chosen, correct) {
			if (answered) return;
			answered = true;

			// Lock all buttons
			infAnswersEl.querySelectorAll('.inf-answer').forEach(b => {
				b.classList.add('locked');
				if (b.dataset.letter === correct) b.classList.add('correct');
			});

			if (chosen === correct) {
				btn.classList.add('correct');
				streak++;
				streakNumEl.textContent = streak;
				// Bump animation
				streakNumEl.classList.add('bump');
				setTimeout(() => streakNumEl.classList.remove('bump'), 250);
				infFeedbackEl.textContent = '✓ Correct!';
				infFeedbackEl.className = 'inf-feedback';
				setTimeout(nextQuestion, 900);
			} else {
				btn.classList.add('wrong');
				infFeedbackEl.textContent = '✗ Wrong! The correct answer is highlighted.';
				infFeedbackEl.className = 'inf-feedback bad';
				setTimeout(endGame, 1600);
			}
		};

		function endGame() {
			// Calculate tokens
			let tokens = streak;
			if (streak >= 50) tokens += 20;
			else if (streak >= 25) tokens += 10;
			else if (streak >= 10) tokens += 5;
			const balance = grantTokens(tokens);

			// Check best
			const prev = getBest();
			const isNew = streak > prev;
			if (isNew) setBest(streak);
			updateBestDisplay();

			// Show game over
			finalStreakEl.textContent = streak;
			newBestBadgeEl.style.display = isNew ? 'inline-block' : 'none';
			tokenGrantEl.innerHTML = `&#128176; +${tokens} tokens earned &mdash; Balance: ${balance}`;

			gameOverEl.style.display = 'block';
			document.getElementById('questionArea').style.display = 'none';

			// Post leaderboard
			const name = getPlayerName();
			const playerId = getPlayerId();
			fetch('/api/leaderboard', {
				method: 'POST',
				headers: { 'content-type': 'application/json' },
				body: JSON.stringify({ game: 'infinite', name, score: streak, total: streak, playerId }),
			}).catch(() => {});
		}

		window.startGame = function() {
			streak = 0;
			poolIndex = 0;
			streakNumEl.textContent = '0';
			gameOverEl.style.display = 'none';
			document.getElementById('questionArea').style.display = '';
			nextQuestion();
		};

		// Init
		pool = buildPool();
		shuffledPool = shuffle(pool);
		updateBestDisplay();
		startGame();
	})();
	</script>
</body>
</html>
