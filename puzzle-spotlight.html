		function escapeHtml(s) {
			return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
		}

		function getTodayStr() {
			const d = new Date();
			return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
		}

		function getDayOfYear() {
			const now = new Date();
			const start = new Date(now.getFullYear(), 0, 0);
			const diff = now - start;
			const oneDay = 1000*60*60*24;
			return Math.floor(diff / oneDay);
		}

		function grantTokens(amount) {
			try {
				const inv = JSON.parse(localStorage.getItem('pokequiz_inventory') || '{}');
				if (typeof inv.tokens !== 'number') inv.tokens = 0;
				inv.tokens += amount;
				localStorage.setItem('pokequiz_inventory', JSON.stringify(inv));
				return inv.tokens;
			} catch { return 0; }
		}

		function shuffle(arr, seed) {
			// seeded Fisher-Yates using seed as initial value
			const a = arr.slice();
			let s = seed;
			function rng() { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; }
			for (let i = a.length - 1; i > 0; i--) {
				const j = Math.floor(rng() * (i + 1));
				[a[i], a[j]] = [a[j], a[i]];
			}
			return a;
		}

		const ALL_TYPES = ['Normal','Fire','Water','Electric','Grass','Ice','Fighting','Poison',
			'Ground','Flying','Psychic','Bug','Rock','Ghost','Dragon','Dark','Steel','Fairy'];

		const todayStr = getTodayStr();
		document.getElementById('spDate').textContent = new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

		// Check if already played today
		const DONE_KEY = `pokequiz_spotlight_${todayStr}`;
		if (localStorage.getItem(DONE_KEY)) {
			document.getElementById('spMain').style.display = 'none';
			const db = document.getElementById('spDoneBanner');
			db.style.display = 'block';
			db.innerHTML = `
				<span class="pz-result-emoji">&#127775;</span>
				<h2>Already done today!</h2>
				<p class="pz-lede" style="margin-bottom:18px;">Come back tomorrow for a new spotlight Pok&eacute;mon.</p>
				<div class="pz-result-actions">
					<a href="puzzle.html" class="btn">Back to Puzzles</a>
					<a href="camp.html" class="btn btn-secondary">Spend Tokens &#127957;&#65039;</a>
				</div>
			`;
			return;
		}

		// Determine today's Pokémon
		const dayIdx = getDayOfYear() % CURATED.length;
		const pokemonId = CURATED[dayIdx];
		const pokemonName = POKEMON_NAMES[pokemonId] || 'Pokémon';
		const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemonId}.png`;
		const cryUrl = `https://play.pokemonshowdown.com/audio/cries/${pokemonName.toLowerCase().replace(/[^a-z]/g,'')}.mp3`;

		// State
		let currentRound = 0;
		let score = 0;
		let roundResults = [];
		let timerInterval = null;

		// Dots
		const dotsEl = document.getElementById('spDots');
		dotsEl.innerHTML = Array.from({length:5}, (_,i) => `<div class="sp-dot" id="dot-${i}"></div>`).join('');

		function setDotActive(i) {
			document.querySelectorAll('.sp-dot').forEach((d,j) => {
				d.classList.remove('active');
				if (j === i) d.classList.add('active');
			});
		}

		function markDot(i, correct) {
			const d = document.getElementById(`dot-${i}`);
			d.classList.remove('active');
			d.classList.add(correct ? 'done' : 'wrong');
		}

		function stopTimer() {
			if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
		}

		function startTimer(seconds, onExpire) {
			stopTimer();
			const fillEl = document.getElementById('spTimerFill');
			const numEl = document.getElementById('spTimerNum');
			if (!fillEl || !numEl) return;
			let rem = seconds;
			numEl.textContent = rem;
			fillEl.style.transition = 'none';
			fillEl.style.width = '100%';
			requestAnimationFrame(() => {
				fillEl.style.transition = `width ${seconds}s linear`;
				fillEl.style.width = '0%';
			});
			timerInterval = setInterval(() => {
				rem--;
				if (numEl) numEl.textContent = rem;
				if (rem <= 0) { stopTimer(); onExpire(); }
			}, 1000);
		}

		function timerHtml(seconds) {
			return `
				<div class="sp-timer-wrap">
					<div class="sp-timer-track"><div class="sp-timer-fill" id="spTimerFill"></div></div>
					<span class="sp-timer-num" id="spTimerNum">${seconds}</span>
				</div>
			`;
		}

		function choicesHtml(choices, correctIdx) {
			const letters = ['A','B','C','D'];
			return `<div class="sp-choices">
				${choices.map((c, i) => `
					<button class="sp-choice" onclick="pickChoice(this, ${i === correctIdx})">
						<span class="sp-choice-letter">${letters[i]}</span>
						<span>${escapeHtml(String(c))}</span>
					</button>
				`).join('')}
			</div>`;
		}

		window.pickChoice = function(btn, isCorrect) {
			if (btn.classList.contains('locked')) return;
			stopTimer();
			lockChoices(isCorrect ? btn : null);
			showFeedback(isCorrect);
			setTimeout(advanceRound, isCorrect ? 900 : 1500);
		};

		function lockChoices(correctBtn) {
			document.querySelectorAll('.sp-choice').forEach(b => {
				b.classList.add('locked');
			});
			// Mark correct one
			document.querySelectorAll('.sp-choice').forEach(b => {
				if (b === correctBtn) b.classList.add('correct');
			});
			if (!correctBtn) {
				// highlight correct from dataset
				document.querySelectorAll('.sp-choice').forEach(b => {
					if (b.onclick && b.onclick.toString().includes('true')) b.classList.add('correct');
				});
			}
		}

		function showFeedback(correct) {
			const fb = document.getElementById('spFeedback');
			if (!fb) return;
			fb.textContent = correct ? '✓ Correct!' : '✗ Wrong!';
			fb.className = 'sp-feedback' + (correct ? '' : ' bad');
		}

		// Load external data
		let statsData = null;
		let flavorData = null;
		let typesData = null;
		let dataLoaded = 0;

		function tryStart() {
			dataLoaded++;
			if (dataLoaded >= 3) showRound(0);
		}

		fetch('js/pokemon-stats.json').then(r=>r.json()).then(d => { statsData = d; tryStart(); }).catch(()=>{ statsData=[]; tryStart(); });
		fetch('js/pokemon-flavor.json').then(r=>r.json()).then(d => { flavorData = d; tryStart(); }).catch(()=>{ flavorData=[]; tryStart(); });
		fetch('js/pokemon-types.json').then(r=>r.json()).then(d => { typesData = d; tryStart(); }).catch(()=>{ typesData=[]; tryStart(); });

		function getStats() {
			if (!statsData) return null;
			return statsData.find(s => s.id === pokemonId) || null;
		}

		function getFlavor() {
			if (!flavorData) return '';
			const entry = flavorData.find(f => f.id === pokemonId);
			return entry ? entry.flavor : '';
		}

		function getTypes() {
			if (!typesData) return ['Normal'];
			const entry = typesData.find(t => t.id === pokemonId);
			return entry ? entry.types.map(t => t.charAt(0).toUpperCase() + t.slice(1)) : ['Normal'];
		}

		function showRound(idx) {
			currentRound = idx;
			setDotActive(idx);
			document.getElementById('spFeedback').textContent = '';
			document.getElementById('spFeedback').className = 'sp-feedback';
			document.getElementById('spMain').style.display = '';

			const rd = document.getElementById('spRound');

			if (idx === 0) showSilhouetteRound(rd);
			else if (idx === 1) showCryRound(rd);
			else if (idx === 2) showDexRound(rd);
			else if (idx === 3) showStatRound(rd);
			else if (idx === 4) showTypeRound(rd);
		}

		function advanceRound() {
			const correct = window._lastRoundCorrect;
			markDot(currentRound, !!correct);
			if (correct) score++;
			roundResults.push(!!correct);

			if (currentRound < 4) {
				showRound(currentRound + 1);
			} else {
				showFinalResults();
			}
		}

		// --- Round 1: Silhouette ---
		function showSilhouetteRound(rd) {
			// Build wrong name choices (seeded from dayIdx)
			const otherIds = Object.keys(POKEMON_NAMES).map(Number).filter(id => id !== pokemonId);
			const shuffled = shuffle(otherIds, dayIdx * 7 + 1).slice(0, 3);
			const wrongNames = shuffled.map(id => POKEMON_NAMES[id] || `#${id}`);
			const allChoices = shuffle([pokemonName, ...wrongNames], dayIdx * 3 + 2);
			const correctIdx = allChoices.indexOf(pokemonName);

			rd.innerHTML = `
				<div class="sp-round-label">Round 1 of 5</div>
				<div class="sp-round-title">&#128065;&#65039; Silhouette</div>
				<div class="sp-sprite-wrap">
					<img src="${spriteUrl}" class="sp-sprite silhouette" id="silSprite" alt="Mystery Pokémon silhouette">
				</div>
				<div class="sp-q">Who's that Pok&eacute;mon?</div>
				${timerHtml(10)}
				${choicesHtml(allChoices, correctIdx)}
			`;
			window._lastRoundCorrect = false;

			// Patch onclick to also set _lastRoundCorrect
			rd.querySelectorAll('.sp-choice').forEach((btn, i) => {
				const isC = (i === correctIdx);
				btn.onclick = () => {
					if (btn.classList.contains('locked')) return;
					window._lastRoundCorrect = isC;
					stopTimer();
					rd.querySelectorAll('.sp-choice').forEach(b => b.classList.add('locked'));
					btn.classList.add(isC ? 'correct' : 'wrong');
					if (!isC) rd.querySelectorAll('.sp-choice')[correctIdx].classList.add('correct');
					showFeedback(isC);
					if (isC) document.getElementById('silSprite').classList.remove('silhouette');
					setTimeout(advanceRound, isC ? 900 : 1500);
				};
			});

			startTimer(10, () => {
				window._lastRoundCorrect = false;
				rd.querySelectorAll('.sp-choice').forEach((b, i) => {
					b.classList.add('locked');
					if (i === correctIdx) b.classList.add('correct');
				});
				showFeedback(false);
				setTimeout(advanceRound, 1500);
			});
		}

		// --- Round 2: Cry ---
		function showCryRound(rd) {
			const otherIds = Object.keys(POKEMON_NAMES).map(Number).filter(id => id !== pokemonId);
			const autocompleteList = [pokemonName, ...otherIds.map(id => POKEMON_NAMES[id]).filter(Boolean)].sort();

			rd.innerHTML = `
				<div class="sp-round-label">Round 2 of 5</div>
				<div class="sp-round-title">&#127925; Cry</div>
				<div class="sp-q">Listen to the Pok&eacute;mon's cry and type its name!</div>
				<button class="sp-cry-btn" id="playCryBtn" onclick="playCry()">&#9654;&#65039; Play Cry</button>
				${timerHtml(20)}
				<div class="sp-text-input-wrap">
					<input list="poke-autocomplete" class="sp-text-input" id="cryInput" type="text" placeholder="Type Pokémon name…" autocomplete="off">
					<datalist id="poke-autocomplete">
						${autocompleteList.map(n => `<option value="${escapeHtml(n)}">`).join('')}
					</datalist>
					<button class="sp-text-submit" onclick="submitCry()">Go</button>
				</div>
			`;
			window._lastRoundCorrect = false;

			const input = document.getElementById('cryInput');
			input.addEventListener('keydown', e => { if (e.key === 'Enter') submitCry(); });

			window.playCry = function() {
				const audio = new Audio(cryUrl);
				audio.play().catch(() => {
					document.getElementById('spFeedback').textContent = 'Could not load audio — try anyway!';
				});
			};

			window.submitCry = function() {
				stopTimer();
				const val = (document.getElementById('cryInput').value || '').trim().toLowerCase();
				const correct = val === pokemonName.toLowerCase();
				window._lastRoundCorrect = correct;
				showFeedback(correct);
				if (!correct) {
					document.getElementById('spFeedback').textContent = `✗ It was ${pokemonName}!`;
					document.getElementById('spFeedback').className = 'sp-feedback bad';
				}
				setTimeout(advanceRound, 1400);
			};

			startTimer(20, () => {
				window._lastRoundCorrect = false;
				document.getElementById('spFeedback').textContent = `✗ Time's up! It was ${pokemonName}.`;
				document.getElementById('spFeedback').className = 'sp-feedback bad';
				setTimeout(advanceRound, 1400);
			});
		}

		// --- Round 3: Pokédex ---
		function showDexRound(rd) {
			let flavor = getFlavor();
			// Redact name (case-insensitive)
			const re = new RegExp(pokemonName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
			const redacted = flavor ? flavor.replace(re, '???') : 'This mysterious Pokémon has intrigued researchers for years.';

			const otherIds = shuffle(Object.keys(POKEMON_NAMES).map(Number).filter(id => id !== pokemonId), dayIdx * 11).slice(0, 3);
			const wrongNames = otherIds.map(id => POKEMON_NAMES[id] || `#${id}`);
			const allChoices = shuffle([pokemonName, ...wrongNames], dayIdx * 5 + 3);
			const correctIdx = allChoices.indexOf(pokemonName);

			rd.innerHTML = `
				<div class="sp-round-label">Round 3 of 5</div>
				<div class="sp-round-title">&#128218; Pok&eacute;dex</div>
				<div class="sp-q" style="font-size:15px;background:#fff;border:1.5px solid #ede5e5;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-style:italic;color:#333;">"${escapeHtml(redacted)}"</div>
				<div class="sp-q">Which Pok&eacute;mon is this?</div>
				${timerHtml(15)}
				${choicesHtml(allChoices, correctIdx)}
			`;
			window._lastRoundCorrect = false;

			rd.querySelectorAll('.sp-choice').forEach((btn, i) => {
				const isC = (i === correctIdx);
				btn.onclick = () => {
					if (btn.classList.contains('locked')) return;
					window._lastRoundCorrect = isC;
					stopTimer();
					rd.querySelectorAll('.sp-choice').forEach(b => b.classList.add('locked'));
					btn.classList.add(isC ? 'correct' : 'wrong');
					if (!isC) rd.querySelectorAll('.sp-choice')[correctIdx].classList.add('correct');
					showFeedback(isC);
					setTimeout(advanceRound, isC ? 900 : 1500);
				};
			});

			startTimer(15, () => {
				window._lastRoundCorrect = false;
				rd.querySelectorAll('.sp-choice').forEach((b, i) => {
					b.classList.add('locked');
					if (i === correctIdx) b.classList.add('correct');
				});
				showFeedback(false);
				setTimeout(advanceRound, 1500);
			});
		}

		// --- Round 4: Stat ---
		function showStatRound(rd) {
			const stats = getStats();
			const baseSpd = stats ? stats.spd : 50;

			// Generate wrong choices: ±10-30 around correct, seeded
			const offsets = shuffle([-28,-19,-13,-7,7,13,19,28], dayIdx * 13).slice(0, 3);
			const wrongs = offsets.map(o => Math.max(1, baseSpd + o));
			const allChoices = shuffle([baseSpd, ...wrongs], dayIdx * 17 + 4);
			const correctIdx = allChoices.indexOf(baseSpd);

			rd.innerHTML = `
				<div class="sp-round-label">Round 4 of 5</div>
				<div class="sp-round-title">&#128200; Stats</div>
				<div class="sp-sprite-wrap">
					<img src="${spriteUrl}" class="sp-sprite" alt="${escapeHtml(pokemonName)}">
				</div>
				<div class="sp-q">What is <strong>${escapeHtml(pokemonName)}</strong>'s base Speed stat?</div>
				${timerHtml(15)}
				${choicesHtml(allChoices, correctIdx)}
			`;
			window._lastRoundCorrect = false;

			rd.querySelectorAll('.sp-choice').forEach((btn, i) => {
				const isC = (i === correctIdx);
				btn.onclick = () => {
					if (btn.classList.contains('locked')) return;
					window._lastRoundCorrect = isC;
					stopTimer();
					rd.querySelectorAll('.sp-choice').forEach(b => b.classList.add('locked'));
					btn.classList.add(isC ? 'correct' : 'wrong');
					if (!isC) rd.querySelectorAll('.sp-choice')[correctIdx].classList.add('correct');
					showFeedback(isC);
					setTimeout(advanceRound, isC ? 900 : 1500);
				};
			});

			startTimer(15, () => {
				window._lastRoundCorrect = false;
				rd.querySelectorAll('.sp-choice').forEach((b, i) => {
					b.classList.add('locked');
					if (i === correctIdx) b.classList.add('correct');
				});
				showFeedback(false);
				setTimeout(advanceRound, 1500);
			});
		}

		// --- Round 5: Type ---
		function showTypeRound(rd) {
			const pokeTypes = getTypes();
			const primaryType = pokeTypes[0];

			const wrongTypes = shuffle(ALL_TYPES.filter(t => t !== primaryType), dayIdx * 19).slice(0, 3);
			const allChoices = shuffle([primaryType, ...wrongTypes], dayIdx * 23 + 5);
			const correctIdx = allChoices.indexOf(primaryType);

			rd.innerHTML = `
				<div class="sp-round-label">Round 5 of 5</div>
				<div class="sp-round-title">&#127380; Type</div>
				<div class="sp-sprite-wrap">
					<img src="${spriteUrl}" class="sp-sprite" alt="${escapeHtml(pokemonName)}">
				</div>
				<div class="sp-q">What is <strong>${escapeHtml(pokemonName)}</strong>'s primary type?</div>
				${timerHtml(10)}
				${choicesHtml(allChoices, correctIdx)}
			`;
			window._lastRoundCorrect = false;

			rd.querySelectorAll('.sp-choice').forEach((btn, i) => {
				const isC = (i === correctIdx);
				btn.onclick = () => {
					if (btn.classList.contains('locked')) return;
					window._lastRoundCorrect = isC;
					stopTimer();
					rd.querySelectorAll('.sp-choice').forEach(b => b.classList.add('locked'));
					btn.classList.add(isC ? 'correct' : 'wrong');
					if (!isC) rd.querySelectorAll('.sp-choice')[correctIdx].classList.add('correct');
					showFeedback(isC);
					setTimeout(advanceRound, isC ? 900 : 1500);
				};
			});

			startTimer(10, () => {
				window._lastRoundCorrect = false;
				rd.querySelectorAll('.sp-choice').forEach((b, i) => {
					b.classList.add('locked');
					if (i === correctIdx) b.classList.add('correct');
				});
				showFeedback(false);
				setTimeout(advanceRound, 1500);
			});
		}

		// --- Leaderboard submit ---
		let submitted = false;
		function postLeaderboard() {
			if (submitted) return;
			submitted = true;
			const name = (sessionStorage.getItem('playerName') || localStorage.getItem('playerName') || '').trim();
			const pid = (window.PokeProfile && window.PokeProfile.playerId) || localStorage.getItem('pokequiz_player_id') || '';
			if (!name || !pid || score <= 0) return;
			window.PokeUtil.submitScore({ game: 'spotlight', name, score: score, playerId: pid });
		}

		// --- Final results ---
		function showFinalResults() {
			postLeaderboard();
			document.getElementById('spMain').style.display = 'none';
			document.getElementById('spFeedback').style.display = 'none';

			let tokens = 5;
			if (score === 5) tokens = 30;
			else if (score === 4) tokens = 20;
			else if (score === 3) tokens = 10;
			const balance = grantTokens(tokens);

			// Mark as done today
			try { localStorage.setItem(DONE_KEY, '1'); } catch {}

			const resultsEl = document.getElementById('spResults');
			resultsEl.style.display = 'block';
			const resultEmoji = score === 5 ? '🏆' : score >= 3 ? '⭐' : '😢';
			const roundDots = roundResults.map(r => r ? '🟢' : '🔴').join(' ');
			resultsEl.innerHTML = `
				<span class="pz-result-emoji">${resultEmoji}</span>
				<img src="${spriteUrl}" class="sp-results-sprite" alt="${escapeHtml(pokemonName)}">
				<div class="sp-results-name">${escapeHtml(pokemonName)}</div>
				<div class="sp-result-dots">${roundResults.map(r => `<span class="sp-result-dot">${r ? '✅' : '❌'}</span>`).join('')}</div>
				<div class="sp-score-label">Your score</div>
				<div class="sp-score-display">${score}<span class="sp-score-denom"> / 5</span></div>
				<div class="sp-token-grant">&#128176; +${tokens} tokens earned &mdash; Balance: ${balance}</div>
				<div class="sp-tomorrow">Come back tomorrow for a new spotlight!</div>
				<div class="sp-results-actions">
					<a href="puzzle.html" class="btn">Back to Puzzles</a>
					<a href="camp.html" class="btn btn-secondary">Spend Tokens &#127957;&#65039;</a>
					<a href="ranking.html" class="btn btn-ghost">Leaderboard</a>
				</div>
			`;
		}
	})();
	</script>
</body>
