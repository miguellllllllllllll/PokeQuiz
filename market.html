<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Market Centre &middot; PokeQuiz</title>
	<meta name="author" content="Angelo Miguel G. Vinluan">
	<link rel="icon" type="image/png" href="Pictures/pokeball.png">
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/market.css">
</head>
<body class="market-body">
	<header class="site-header">
		<a href="index.html" class="brand-link"><h1 class="brand">PokeQuiz</h1></a>
		<nav>
			<a href="index.html">Home</a>
			<a href="play.html">Play</a>
			<a href="puzzle.html">Puzzles</a>
			<a href="ranking.html">Leaderboard</a>
			<a href="camp.html" class="active">Camp</a>
		</nav>
		<div class="profile-wrap">
			<button class="profile-btn" aria-haspopup="true" aria-expanded="false" type="button">
				<img class="profile-avatar" src="Pictures/pokeball.png" alt="">
				<span class="profile-name">Trainer</span>
			</button>
		</div>
	</header>

	<!-- Full-screen market world -->
	<div class="market-world-wrap" id="marketWrap">

		<!-- Location badge (top-left, matches camp) -->
		<div class="market-location" aria-hidden="true">
			<span class="market-location-name">MARKET CENTRE</span>
		</div>

		<!-- Back to camp pill (top-right) -->
		<a class="market-back" href="camp.html" aria-label="Return to camp">
			<span class="market-back-arrow">&#x2190;</span>
			<span class="market-back-label">Camp</span>
		</a>

		<!-- Tokens balance, mirrors mart style -->
		<div class="market-balance" aria-hidden="true">
			<span class="market-balance-icon">💰</span>
			<span id="marketTokens">0</span>
			<span class="market-balance-label">Tokens</span>
		</div>

		<!-- Plaza — a styled pixel-town courtyard with shop buildings -->
		<div class="market-plaza">
			<div class="market-plaza-frame">

				<!-- Banner sign at the top of the plaza -->
				<div class="market-banner">
					<span class="market-banner-bolt">⚡</span>
					<span class="market-banner-text">Welcome to the Market Centre</span>
					<span class="market-banner-bolt">⚡</span>
				</div>

				<!-- Row of shop buildings — click to enter -->
				<div class="market-row">

					<button class="market-shop" data-shop="mart" type="button" aria-label="Pikachu's Mart">
						<div class="market-roof market-roof--red">
							<span class="market-shop-sign">Pikachu's Mart</span>
						</div>
						<div class="market-awning market-awning--red"></div>
						<div class="market-front">
							<div class="market-window"></div>
							<div class="market-door"></div>
							<div class="market-window"></div>
						</div>
						<div class="market-shop-icon">🏪</div>
					</button>

					<button class="market-shop" data-shop="berries" type="button" aria-label="Berry Stand">
						<div class="market-roof market-roof--green">
							<span class="market-shop-sign">Berry Stand</span>
						</div>
						<div class="market-awning market-awning--green"></div>
						<div class="market-front">
							<div class="market-window"></div>
							<div class="market-door"></div>
							<div class="market-window"></div>
						</div>
						<div class="market-shop-icon">🍓</div>
					</button>

					<button class="market-shop" data-shop="stones" type="button" aria-label="Evolution Stones">
						<div class="market-roof market-roof--purple">
							<span class="market-shop-sign">Stone Vendor</span>
						</div>
						<div class="market-awning market-awning--purple"></div>
						<div class="market-front">
							<div class="market-window"></div>
							<div class="market-door"></div>
							<div class="market-window"></div>
						</div>
						<div class="market-shop-icon">🔮</div>
					</button>

					<button class="market-shop" data-shop="cosmetics" type="button" aria-label="Cosmetics Boutique">
						<div class="market-roof market-roof--blue">
							<span class="market-shop-sign">Boutique</span>
						</div>
						<div class="market-awning market-awning--blue"></div>
						<div class="market-front">
							<div class="market-window"></div>
							<div class="market-door"></div>
							<div class="market-window"></div>
						</div>
						<div class="market-shop-icon">🎨</div>
					</button>

				</div>

				<!-- Cobblestone path with NPCs (decorative) -->
				<div class="market-path">
					<div class="market-npc market-npc--left">
						<div class="market-npc-sprite">👨‍🌾</div>
						<div class="market-npc-shadow"></div>
					</div>
					<div class="market-fountain" aria-hidden="true">
						<div class="market-fountain-basin"></div>
						<div class="market-fountain-water"></div>
						<div class="market-fountain-drop market-fountain-drop--1"></div>
						<div class="market-fountain-drop market-fountain-drop--2"></div>
						<div class="market-fountain-drop market-fountain-drop--3"></div>
					</div>
					<div class="market-npc market-npc--right">
						<div class="market-npc-sprite">🧑‍🍳</div>
						<div class="market-npc-shadow"></div>
					</div>
				</div>

				<!-- Lanterns flanking the bottom edge -->
				<div class="market-lantern market-lantern--left">🏮</div>
				<div class="market-lantern market-lantern--right">🏮</div>

			</div>
		</div>

		<!-- Shop dialog — bottom of screen, matches camp dialog -->
		<div class="market-dialog" id="marketDialog" hidden role="dialog" aria-live="polite">
			<div class="market-dialog-head">
				<span class="market-dialog-title" id="marketDialogTitle">Shop</span>
				<button class="market-dialog-close" id="marketDialogClose" type="button" aria-label="Close">×</button>
			</div>
			<div class="market-dialog-body" id="marketDialogBody"></div>
			<div class="market-dialog-foot">
				<button class="mk-btn mk-btn--alt" id="marketDialogLeave" type="button">Leave</button>
			</div>
		</div>

		<!-- Status toast -->
		<div class="market-status" id="marketStatus" hidden></div>
	</div>

	<script src="js/profile.js" defer></script>
	<script src="js/trainer-palette.js" defer></script>
	<script src="js/market.js" defer></script>
</body>
</html>
