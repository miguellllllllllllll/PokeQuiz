<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Trainer Sign-In &middot; PokeQuiz</title>
	<meta name="author" content="Angelo Miguel G. Vinluan">
	<link rel="icon" type="image/png" href="Pictures/pokeball.png">
	<meta name="description" content="Enter your trainer name and start a PokeQuiz Pokémon trivia run.">
	<meta property="og:type" content="website">
	<meta property="og:site_name" content="PokeQuiz">
	<meta property="og:title" content="Start a Quiz — PokeQuiz">
	<meta property="og:description" content="Enter your trainer name and start a PokeQuiz Pokémon trivia run.">
	<meta property="og:image" content="https://poke-quiz-chi.vercel.app/Pictures/pokeball.png">
	<meta property="og:url" content="https://poke-quiz-chi.vercel.app/play">
	<meta name="twitter:card" content="summary">
	<meta name="twitter:title" content="Start a Quiz — PokeQuiz">
	<meta name="twitter:description" content="Enter your trainer name and start a PokeQuiz Pokémon trivia run.">
	<meta name="twitter:image" content="https://poke-quiz-chi.vercel.app/Pictures/pokeball.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700;800&display=swap">
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/playerinfo.css">
</head>
<body>
	<header class="site-header">
		<a href="index.html" class="brand-link"><h1 class="brand">PokeQuiz</h1></a>
		<nav>
			<a href="index.html">Home</a>
			<a href="play.html" class="active">Play</a>
			<a href="quizzes.html">Quizzes</a>
			<a href="puzzle.html">Puzzles</a>
			<a href="ranking.html">Leaderboard</a>
			<a href="camp.html">Camp</a>
		</nav>
		<div class="profile-wrap">
			<button class="profile-btn" aria-haspopup="true" aria-expanded="false" type="button">
				<img class="profile-avatar" src="Pictures/pokeball.png" alt="">
				<span class="profile-name">Trainer</span>
			</button>
			<div class="profile-panel" hidden role="dialog" aria-label="Trainer profile">
				<div class="pp-title">Trainer Profile</div>
				<div class="pp-row">
					<span class="pp-row-label">Name</span>
					<span class="pp-name-view">&mdash;</span>
				</div>
				<div class="pp-row">
					<span class="pp-row-label">Best Score</span>
					<span class="pp-score-view">&mdash;</span>
				</div>
				<div class="pp-edit-form" hidden>
					<input class="pp-input" type="text" maxlength="24" placeholder="Your name">
					<button class="pp-mini-btn pp-save-btn" type="button">Save</button>
					<button class="pp-mini-btn pp-secondary pp-cancel-btn" type="button">Cancel</button>
				</div>
				<div class="pp-actions">
					<button class="pp-edit-btn" type="button">Edit Name</button>
					<button class="pp-clear-btn" type="button">Clear Data</button>
				</div>
			</div>
		</div>
	</header>

	<main class="container narrow">
		<section class="card form-card">
			<div class="form-bg" aria-hidden="true">
				<img class="form-pokeball" src="Pictures/pokeball.png" alt="">
			</div>

			<div class="form-inner">
				<div class="eyebrow">
					<span class="dot"></span>
					<span>Register New Trainer</span>
				</div>
				<h1>Trainer Sign-In</h1>
				<p class="lede">Tell us who's playing. We'll save your name to the leaderboard.</p>

				<form id="login" action="quizzes.html" method="get" novalidate>
					<fieldset>
						<legend class="visually-hidden">Player information</legend>

						<div class="field">
							<span class="field-label">Gender</span>
							<div class="radio-group">
								<label class="radio">
									<input type="radio" name="gender" value="male" checked>
									<span>Male</span>
								</label>
								<label class="radio">
									<input type="radio" name="gender" value="female">
									<span>Female</span>
								</label>
								<label class="radio">
									<input type="radio" name="gender" value="other">
									<span>Other</span>
								</label>
							</div>
						</div>

						<div class="field">
							<label for="playerName">Player Name</label>
							<input type="text" id="playerName" name="playerName" required minlength="1" maxlength="30" placeholder="e.g. Ash" autocomplete="off">
						</div>

						<div class="form-actions">
							<button type="submit" class="btn">Choose Quiz &rarr;</button>
							<button type="reset" class="btn btn-secondary">Reset</button>
							<a href="index.html" class="btn btn-ghost">&larr; Back home</a>
						</div>
					</fieldset>
				</form>
			</div>
		</section>
	</main>

	<footer>Made with care by Angelo Miguel G. Vinluan</footer>

	<script src="js/util.js" defer></script>
	<script src="js/profile.js" defer></script>
	<script>
		(function() {
			const form = document.getElementById('login');
			const playerName = document.getElementById('playerName');
			const inputs = form.querySelectorAll('input[type="text"], input[type="number"], input[type="email"]');

			// Prefill name from saved profile
			try {
				const saved = localStorage.getItem('playerName') || sessionStorage.getItem('playerName');
				if (saved && !playerName.value) {
					playerName.value = saved;
					playerName.classList.add('valid');
				}
			} catch {}

			inputs.forEach(input => {
				input.addEventListener('blur', () => {
					if (input.value.trim() === '') {
						input.classList.remove('valid');
						input.classList.toggle('invalid', input.hasAttribute('required'));
					} else {
						input.classList.add('valid');
						input.classList.remove('invalid');
					}
				});
			});

			function getPlayerId() {
				let id = '';
				try { id = localStorage.getItem('pokequiz_player_id') || ''; } catch {}
				if (!id) {
					id = (typeof crypto !== 'undefined' && crypto.randomUUID)
						? crypto.randomUUID()
						: 'id_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
					try { localStorage.setItem('pokequiz_player_id', id); } catch {}
				}
				return id;
			}

			function ensureNameErrorEl() {
				let el = document.getElementById('playerNameError');
				if (el) return el;
				el = document.createElement('div');
				el.id = 'playerNameError';
				el.style.cssText = 'margin-top:8px;padding:10px 14px;background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.25);border-radius:10px;color:#b91c1c;font-size:13px;font-weight:600;';
				playerName.insertAdjacentElement('afterend', el);
				return el;
			}

			let claimInFlight = false;
			form.addEventListener('submit', async (e) => {
				const name = playerName.value.trim();
				const errEl = ensureNameErrorEl();
				errEl.hidden = true;
				errEl.textContent = '';
				if (name === '') {
					e.preventDefault();
					playerName.classList.add('invalid');
					playerName.focus();
					return;
				}
				if (claimInFlight) { e.preventDefault(); return; }

				// Claim the name with the API before navigating, so the user
				// can't reach the quiz with a name owned by another trainer.
				e.preventDefault();
				claimInFlight = true;
				const submitBtn = form.querySelector('button[type=submit]');
				if (submitBtn) submitBtn.disabled = true;
				try {
					const res = await fetch('/api/leaderboard', {
						method: 'POST',
						headers: { 'content-type': 'application/json' },
						body: JSON.stringify({ action: 'claim', name, playerId: getPlayerId() }),
					});
					if (res.status === 409) {
						const data = await res.json().catch(() => ({}));
						errEl.textContent = data.message || `"${name}" is already claimed by another trainer.`;
						errEl.hidden = false;
						playerName.classList.add('invalid');
						playerName.focus();
						return;
					}
				} catch {
					// Offline — allow the run; later POSTs will re-check ownership.
				} finally {
					claimInFlight = false;
					if (submitBtn) submitBtn.disabled = false;
				}

				try {
					localStorage.setItem('playerName', name);
					sessionStorage.setItem('playerName', name);
				} catch {}
				form.submit();
			});
		})();
	</script>
</body>
</html>
