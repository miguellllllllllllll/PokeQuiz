<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Camp &middot; PokeQuiz</title>
	<meta name="author" content="Angelo Miguel G. Vinluan">
	<link rel="icon" type="image/png" href="Pictures/pokeball.png">
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/camp.css">
</head>
<body class="camp-body">
	<header class="site-header">
		<a href="index.html" class="brand-link"><h1 class="brand">PokeQuiz</h1></a>
		<nav>
			<a href="index.html">Home</a>
			<a href="play.html">Play</a>
			<a href="puzzle.html">Puzzles</a>
			<a href="ranking.html">Leaderboard</a>
			<a href="camp.html" class="active">Camp</a>
		</nav>
		<div class="profile-wrap">
			<button class="profile-btn" aria-haspopup="true" aria-expanded="false" type="button">
				<img class="profile-avatar" src="Pictures/pokeball.png" alt="">
				<span class="profile-name">Trainer</span>
			</button>
			<div class="profile-panel" hidden role="dialog" aria-label="Trainer profile">
				<div class="pp-title">Trainer Profile</div>
				<div class="pp-row">
					<span class="pp-row-label">Name</span>
					<span class="pp-name-view">&mdash;</span>
				</div>
				<div class="pp-row">
					<span class="pp-row-label">Best Score</span>
					<span class="pp-score-view">&mdash;</span>
				</div>
				<div class="pp-edit-form" hidden>
					<input class="pp-input" type="text" maxlength="24" placeholder="Your name">
					<button class="pp-mini-btn pp-save-btn" type="button">Save</button>
					<button class="pp-mini-btn pp-secondary pp-cancel-btn" type="button">Cancel</button>
				</div>
				<div class="pp-actions">
					<button class="pp-edit-btn" type="button">Edit Name</button>
					<button class="pp-clear-btn" type="button">Clear Data</button>
				</div>
			</div>
		</div>
	</header>

	<!-- Full-screen world — no card/container wrapper -->
	<div class="camp-world-wrap" id="campWrap">
		<!-- Phaser injects its canvas into #campWrap -->

		<!-- Location badge (top-left, Pokémon style) -->
		<div class="camp-location" aria-hidden="true">
			<span class="camp-location-name">TRAINER CAMP</span>
		</div>

		<!-- Controls hint (top-right) -->
		<div class="camp-controls-hint" aria-hidden="true">
			<span class="ctrl-key">W</span>
			<span class="ctrl-key">A</span>
			<span class="ctrl-key">S</span>
			<span class="ctrl-key">D</span>
			<span class="ctrl-sep">or</span>
			<span class="ctrl-key">&#x2191;</span>
			<span class="ctrl-key">&#x2190;</span>
			<span class="ctrl-key">&#x2193;</span>
			<span class="ctrl-key">&#x2192;</span>
		</div>

		<!-- Mobile joystick (bottom-right) -->
		<div class="joystick-wrap" id="joystickWrap" aria-hidden="true">
			<div class="joystick-base" id="joystickBase">
				<div class="joystick-knob" id="joystickKnob"></div>
			</div>
		</div>
	</div>

	<script src="js/profile.js" defer></script>
	<script src="js/trainer-look.js" defer></script>
	<script src="https://cdn.jsdelivr.net/npm/phaser@3.88.0/dist/phaser.min.js" defer></script>
	<script src="js/camp.js" defer></script>
</body>
</html>
