name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax-check all JS
        run: |
          fail=0
          while IFS= read -r f; do
            node --check "$f" || { echo "syntax error: $f"; fail=1; }
          done < <(find js api tests sw.js -type f \( -name '*.js' -o -name '*.mjs' \) 2>/dev/null)
          exit $fail

      - name: Leaderboard config consistency
        run: node tests/check-consistency.mjs
