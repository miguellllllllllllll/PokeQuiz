<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title id="pageTitle">PokeQuiz &middot; Quiz</title>
	<meta name="author" content="Angelo Miguel G. Vinluan">
	<link rel="icon" type="image/png" href="Pictures/pokeball.png">
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#ee1515">
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/quiz.css">
</head>
<body>
	<header class="site-header">
		<a href="index.html" class="brand-link"><h1 class="brand">PokeQuiz</h1></a>
		<nav>
			<a href="index.html">Home</a>
			<a href="play.html">Play</a>
			<a href="quizzes.html" class="active">Quizzes</a>
			<a href="puzzle.html">Puzzles</a>
			<a href="ranking.html">Leaderboard</a>
			<a href="camp.html">Camp</a>
		</nav>
		<div class="profile-wrap">
			<button class="profile-btn" aria-haspopup="true" aria-expanded="false" type="button">
				<img class="profile-avatar" src="Pictures/pokeball.png" alt="">
				<span class="profile-name">Trainer</span>
			</button>
			<div class="profile-panel" hidden role="dialog" aria-label="Trainer profile">
				<div class="pp-title">Trainer Profile</div>
				<div class="pp-row">
					<span class="pp-row-label">Name</span>
					<span class="pp-name-view">&mdash;</span>
				</div>
				<div class="pp-row">
					<span class="pp-row-label">Best Score</span>
					<span class="pp-score-view">&mdash;</span>
				</div>
				<div class="pp-edit-form" hidden>
					<input class="pp-input" type="text" maxlength="24" placeholder="Your name">
					<button class="pp-mini-btn pp-save-btn" type="button">Save</button>
					<button class="pp-mini-btn pp-secondary pp-cancel-btn" type="button">Cancel</button>
				</div>
				<div class="pp-actions">
					<button class="pp-edit-btn" type="button">Edit Name</button>
					<button class="pp-clear-btn" type="button">Clear Data</button>
				</div>
			</div>
		</div>
	</header>

	<main class="container">
		<section class="card quiz-card">
			<div class="quiz-bg" aria-hidden="true">
				<img class="quiz-pokeball" src="Pictures/pokeball.png" alt="">
			</div>
			<div class="quiz-meta">
				<div class="player-pill" id="playerPill">
					<img src="Pictures/pokeball.png" alt="" class="player-icon">
					<span id="playerGreeting">Trainer</span>
				</div>
				<div class="quiz-title-pill" id="quizTitlePill">
					<span class="quiz-title-name" id="quizTitleName">Master Quiz</span>
					<span class="quiz-title-diff" id="quizTitleDiff">Master</span>
				</div>
				<div class="progress">
					<span id="progressText">1 / 21</span>
					<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
				</div>
			</div>

			<div class="quiz-stage">
				<div id="quiz" class="quiz-slides" aria-live="polite"></div>
			</div>

			<div class="quiz-controls">
				<button id="previous" class="btn btn-secondary">&larr; Previous</button>
				<button id="next" class="btn">Next &rarr;</button>
				<button id="submit" class="btn">Submit Quiz</button>
			</div>

			<div id="results" class="results" hidden></div>
		</section>
	</main>

	<footer>Made with care by Angelo Miguel G. Vinluan</footer>

	<script src="js/profile.js" defer></script>
	<script src="js/quizzes.js"></script>
	<script>
		function getParameterByName(name, url) {
			if (!url) url = window.location.href;
			name = name.replace(/[\[\]]/g, '\\$&');
			const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
			const results = regex.exec(url);
			if (!results) return null;
			if (!results[2]) return '';
			return decodeURIComponent(results[2].replace(/\+/g, ' '));
		}

		function escapeHtml(s) {
			return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
		}

		(function(){
			const playerName = (getParameterByName('playerName') || '').trim() || 'Trainer';
			document.getElementById('playerGreeting').textContent = playerName;
			try {
				sessionStorage.setItem('playerName', playerName);
				if (playerName !== 'Trainer') localStorage.setItem('playerName', playerName);
				if (window.PokeProfile && typeof window.PokeProfile.refresh === 'function') {
					window.PokeProfile.refresh();
				}
			} catch {}

			const quizId = (getParameterByName('quiz') || 'master').toLowerCase();
			const QUIZZES = (window.POKEQUIZ_QUIZZES || {});
			const quizDef = QUIZZES[quizId] || QUIZZES.master;
			document.getElementById('quizTitleName').textContent = quizDef.name;
			document.getElementById('quizTitleDiff').textContent = quizDef.difficulty;
			document.getElementById('pageTitle').textContent = `PokeQuiz · ${quizDef.name}`;
			const myQuestions = quizDef.questions;

			const quizContainer = document.getElementById('quiz');
			const resultsContainer = document.getElementById('results');
			const previousButton = document.getElementById('previous');
			const nextButton = document.getElementById('next');
			const submitButton = document.getElementById('submit');
			const progressText = document.getElementById('progressText');
			const progressFill = document.getElementById('progressFill');

			function buildQuiz() {
				const out = myQuestions.map((q, qi) => {
					const answers = Object.entries(q.answers).map(([letter, text]) => `
						<label class="answer">
							<input type="radio" name="question${qi}" value="${escapeHtml(letter)}">
							<span class="answer-letter">${escapeHtml(letter.toUpperCase())}</span>
							<span class="answer-text">${escapeHtml(text)}</span>
						</label>
					`).join('');
					return `
						<div class="slide" data-index="${qi}" role="group" aria-label="Question ${qi + 1} of ${myQuestions.length}">
							<div class="question-num">Question ${qi + 1} of ${myQuestions.length}</div>
							<div class="question" tabindex="-1">${escapeHtml(q.question)}</div>
							<div class="answers">${answers}</div>
						</div>
					`;
				}).join('');
				quizContainer.innerHTML = out;
			}

			function updateProgress() {
				progressText.textContent = `${currentSlide + 1} / ${myQuestions.length}`;
				progressFill.style.width = `${((currentSlide + 1) / myQuestions.length) * 100}%`;
			}

			function showSlide(n) {
				slides[currentSlide].classList.remove('active-slide');
				slides[n].classList.add('active-slide');
				currentSlide = n;

				previousButton.style.display = currentSlide === 0 ? 'none' : 'inline-flex';
				if (currentSlide === slides.length - 1) {
					nextButton.style.display = 'none';
					submitButton.style.display = 'inline-flex';
				} else {
					nextButton.style.display = 'inline-flex';
					submitButton.style.display = 'none';
				}
				updateProgress();
				quizContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
				// Move focus to the new question so screen-reader and keyboard
				// users land on the fresh content after navigating.
				const heading = slides[n].querySelector('.question');
				if (heading) heading.focus({ preventScroll: true });
			}

			function grantQuizTokens(pct) {
				let tokens = 5;
				if (pct === 100) tokens = 15;
				else if (pct >= 80) tokens = 12;
				else if (pct >= 60) tokens = 10;
				else if (pct >= 40) tokens = 7;
				try {
					const inv = JSON.parse(localStorage.getItem('pokequiz_inventory') || '{}');
					if (typeof inv.tokens !== 'number') inv.tokens = 0;
					inv.tokens += tokens;
					localStorage.setItem('pokequiz_inventory', JSON.stringify(inv));
				} catch {}
				return tokens;
			}

			function getRank(pct) {
				if (pct === 100) return { label: 'Perfect!', emoji: '🏆', color: '#f59e0b' };
				if (pct >= 80)  return { label: 'Champion', emoji: '⭐', color: '#6366f1' };
				if (pct >= 60)  return { label: 'Ace Trainer', emoji: '🎯', color: '#10b981' };
				if (pct >= 40)  return { label: 'Rookie', emoji: '🌱', color: '#3b82f6' };
				return { label: 'Try Again', emoji: '💪', color: '#ef4444' };
			}

			function showResults() {
				const answerContainers = quizContainer.querySelectorAll('.answers');
				let numCorrect = 0;

				myQuestions.forEach((q, qi) => {
					const container = answerContainers[qi];
					const selected = container.querySelector(`input[name=question${qi}]:checked`);
					const userAnswer = selected ? selected.value : null;
					const correct = q.correctAnswer;

					container.querySelectorAll('.answer').forEach(label => {
						const val = label.querySelector('input').value;
						if (val === correct) label.classList.add('is-correct');
						if (val === userAnswer && val !== correct) label.classList.add('is-wrong');
					});

					if (userAnswer === correct) numCorrect++;
				});

				const pct = Math.round((numCorrect / myQuestions.length) * 100);
				const tokensEarned = grantQuizTokens(pct);
				const rank = getRank(pct);

				let totalTokens = 0;
				try {
					const inv = JSON.parse(localStorage.getItem('pokequiz_inventory') || '{}');
					totalTokens = typeof inv.tokens === 'number' ? inv.tokens : 0;
				} catch {}

				resultsContainer.hidden = false;
				resultsContainer.innerHTML = `
					<div class="results-rank" style="color:${rank.color}">
						<span class="results-rank-emoji">${rank.emoji}</span>
						<span class="results-rank-label">${rank.label}</span>
					</div>
					<h2>Quiz Complete!</h2>
					<div class="score">
						<span class="score-num">${numCorrect}</span>
						<span class="score-denom"> / ${myQuestions.length}</span>
					</div>
					<div class="score-pct">${pct}% Correct</div>
					<div class="results-token-grant">
						<span class="rtg-icon">💰</span>
						<span class="rtg-text">+${tokensEarned} Tokens earned &mdash; Balance: ${totalTokens}</span>
					</div>
					<p class="results-msg" id="resultsMsg" aria-live="polite">Nice run, ${escapeHtml(playerName)}! Saving your score&hellip;</p>
					<div class="results-actions">
						<a href="ranking.html" class="btn">View Leaderboard &rarr;</a>
						<a href="camp.html" class="btn btn-secondary">Spend Tokens at Camp 🏕️</a>
						<a href="quizzes.html" class="btn btn-ghost">Pick Another Quiz</a>
					</div>
				`;

				sessionStorage.setItem('playerScore', String(numCorrect));
				saveToLeaderboard(playerName, numCorrect);

				submitButton.disabled = true;
				submitButton.style.display = 'none';
				previousButton.style.display = 'none';
				resultsContainer.scrollIntoView({ behavior: 'smooth' });
			}

			function saveToLeaderboard(name, score) {
				try {
					const key = 'pokequiz_leaderboard';
					const list = JSON.parse(localStorage.getItem(key) || '[]');
					list.push({ name, score, total: myQuestions.length, at: Date.now() });
					list.sort((a, b) => b.score - a.score || a.at - b.at);
					localStorage.setItem(key, JSON.stringify(list.slice(0, 50)));
				} catch (e) { /* localStorage unavailable */ }

				let playerId = '';
				try { playerId = localStorage.getItem('pokequiz_player_id') || ''; } catch {}
				if (!playerId) {
					playerId = (typeof crypto !== 'undefined' && crypto.randomUUID)
						? crypto.randomUUID()
						: 'id_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
					try { localStorage.setItem('pokequiz_player_id', playerId); } catch {}
				}

				function setMsg(text) {
					const el = document.getElementById('resultsMsg');
					if (el) el.textContent = text;
				}

				fetch('/api/leaderboard', {
					method: 'POST',
					headers: { 'content-type': 'application/json' },
					body: JSON.stringify({ game: 'quiz', name, score, total: myQuestions.length, playerId }),
				})
					.then((res) => {
						if (res.ok) {
							setMsg(`Nice run, ${name}! Your score is on the global leaderboard.`);
						} else {
							setMsg(`Nice run, ${name}! Score saved on this device — the leaderboard rejected it.`);
						}
					})
					.catch(() => {
						setMsg(`Nice run, ${name}! Score saved on this device — couldn't reach the leaderboard.`);
					});
			}

			buildQuiz();
			const slides = document.querySelectorAll('.slide');
			let currentSlide = 0;
			showSlide(0);

			submitButton.addEventListener('click', () => {
				// Warn before submitting with unanswered questions.
				let unanswered = 0;
				myQuestions.forEach((q, qi) => {
					if (!quizContainer.querySelector(`input[name=question${qi}]:checked`)) unanswered++;
				});
				if (unanswered > 0) {
					const ok = confirm(
						`You have ${unanswered} unanswered question${unanswered === 1 ? '' : 's'}. ` +
						`They will be marked wrong. Submit anyway?`
					);
					if (!ok) return;
				}
				showResults();
			});
			previousButton.addEventListener('click', () => showSlide(currentSlide - 1));
			nextButton.addEventListener('click', () => showSlide(currentSlide + 1));
		})();
	</script>
</body>
</html>
