<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>PokeQuiz &middot; Quiz</title>
	<meta name="author" content="Angelo Miguel G. Vinluan">
	<link rel="icon" type="image/png" href="Pictures/pokeball.png">
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/quiz.css">
</head>
<body>
	<header class="site-header">
		<a href="index.html" class="brand-link"><h1 class="brand">PokeQuiz</h1></a>
		<nav>
			<a href="index.html">Home</a>
			<a href="play.html" class="active">Play</a>
			<a href="ranking.html">Leaderboard</a>
		</nav>
		<div class="profile-wrap">
			<button class="profile-btn" aria-haspopup="true" aria-expanded="false" type="button">
				<img class="profile-avatar" src="Pictures/pokeball.png" alt="">
				<span class="profile-name">Trainer</span>
			</button>
			<div class="profile-panel" hidden role="dialog" aria-label="Trainer profile">
				<div class="pp-title">Trainer Profile</div>
				<div class="pp-row">
					<span class="pp-row-label">Name</span>
					<span class="pp-name-view">&mdash;</span>
				</div>
				<div class="pp-row">
					<span class="pp-row-label">Best Score</span>
					<span class="pp-score-view">&mdash;</span>
				</div>
				<div class="pp-edit-form" hidden>
					<input class="pp-input" type="text" maxlength="24" placeholder="Your name">
					<button class="pp-mini-btn pp-save-btn" type="button">Save</button>
					<button class="pp-mini-btn pp-secondary pp-cancel-btn" type="button">Cancel</button>
				</div>
				<div class="pp-actions">
					<button class="pp-edit-btn" type="button">Edit Name</button>
					<button class="pp-clear-btn" type="button">Clear Data</button>
				</div>
			</div>
		</div>
	</header>

	<main class="container">
		<section class="card quiz-card">
			<div class="quiz-bg" aria-hidden="true">
				<img class="quiz-pokeball" src="Pictures/pokeball.png" alt="">
			</div>
			<div class="quiz-meta">
				<div class="player-pill" id="playerPill">
					<img src="Pictures/pokeball.png" alt="" class="player-icon">
					<span id="playerGreeting">Trainer</span>
				</div>
				<div class="progress">
					<span id="progressText">1 / 22</span>
					<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
				</div>
			</div>

			<div class="quiz-stage">
				<div id="quiz" class="quiz-slides"></div>
			</div>

			<div class="quiz-controls">
				<button id="previous" class="btn btn-secondary">&larr; Previous</button>
				<button id="next" class="btn">Next &rarr;</button>
				<button id="submit" class="btn">Submit Quiz</button>
			</div>

			<div id="results" class="results" hidden></div>
		</section>
	</main>

	<footer>Made with care by Angelo Miguel G. Vinluan</footer>

	<script src="js/profile.js" defer></script>
	<script>
		function getParameterByName(name, url) {
			if (!url) url = window.location.href;
			name = name.replace(/[\[\]]/g, '\\$&');
			const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
			const results = regex.exec(url);
			if (!results) return null;
			if (!results[2]) return '';
			return decodeURIComponent(results[2].replace(/\+/g, ' '));
		}

		function escapeHtml(s) {
			return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
		}

		(function(){
			const playerName = (getParameterByName('playerName') || '').trim() || 'Trainer';
			document.getElementById('playerGreeting').textContent = playerName;
			sessionStorage.setItem('playerName', playerName);

			const myQuestions = [
				{ question: "What was Ash's starter pokemon?", answers: { a: "The Mouse Pokemon", b: "The Sky Squirrel Pokemon", c: "The Tiny Mouse Pokemon", d: "The Rat Pokemon" }, correctAnswer: "a" },
				{ question: "Who was the first pokemon Ash caught?", answers: { a: "Caterpie", b: "Pidgey", c: "Squirtle", d: "Pikachu" }, correctAnswer: "a" },
				{ question: "Where did Ash win his first Pokemon League?", answers: { a: "Kanto Region", b: "Alola Region", c: "Kalos Region", d: "Unova Region" }, correctAnswer: "b" },
				{ question: "What was the name of Ash's main rival in the Kanto Region?", answers: { a: "Gary", b: "Brock", c: "Giovanni", d: "Blue" }, correctAnswer: "a" },
				{ question: "What are the three types of the starter pokemon?", answers: { a: "Lightning, Flying, Fighting", b: "Fire, Water, Grass", c: "Dark, Ghost, Psychic", d: "Fire, Ice, Dragon" }, correctAnswer: "b" },
				{ question: "Which one are the Legendary Birds of the Kanto Region?", answers: { a: "Kyogre, Groudon, Rayquaza", b: "Artickuno, Zapdose, Moltress", c: "Zekrom, Kyurem, Reshiram", d: "Articuno, Zapdos, Moltres" }, correctAnswer: "d" },
				{ question: "Who was Pokemon Champion Cynthia's main Pokemon?", answers: { a: "Salamence", b: "Metagross", c: "Garchomp", d: "Dragonite" }, correctAnswer: "c" },
				{ question: "In what generation was Mega Evolution introduced?", answers: { a: "6th", b: "7th", c: "5th", d: "9th" }, correctAnswer: "a" },
				{ question: "What color are the footprints on a Shiny Galarian Stunfisk?", answers: { a: "Green", b: "Yellow", c: "Brown", d: "Blue" }, correctAnswer: "b" },
				{ question: "What item do you need to give Scyther to evolve?", answers: { a: "Equalizer", b: "Charged Battery", c: "Metal Claw", d: "Black Augurite" }, correctAnswer: "d" },
				{ question: "Who did Ash lose to in the Kalos Pokemon League?", answers: { a: "Iris", b: "Alain", c: "Diantha", d: "Cynthia" }, correctAnswer: "b" },
				{ question: "How do you differentiate a male Pikachu and a female Pikachu?", answers: { a: "Color of Their Tail", b: "Shape of Their Tail", c: "Shape of One of Their Ears", d: "Color of Their Ears" }, correctAnswer: "b" },
				{ question: "What's the name of the leader of Team Rocket?", answers: { a: "Jessie", b: "James", c: "Giovanni", d: "Ghetsis" }, correctAnswer: "c" },
				{ question: "Which Tapu is the guardian of Melemele Island?", answers: { a: "Tapu Koko", b: "Tapu Lele", c: "Tapu Bulu", d: "Tapu Fini" }, correctAnswer: "a" },
				{ question: "In the very first episode of Pokemon what chased after Ash and Pikachu?", answers: { a: "Fearow", b: "Spearow", c: "Pidgey", d: "Pidgeot" }, correctAnswer: "b" },
				{ question: "How was Pikachu's Pokeball unique when Ash received it?", answers: { a: "Color of The Pokeball", b: "Unusual Size of The Pokeball", c: "The Shape of The Pokeball", d: "A Figure on The Pokeball" }, correctAnswer: "d" },
				{ question: "How many Deoxys forms are there?", answers: { a: "2", b: "3", c: "4", d: "5" }, correctAnswer: "c" },
				{ question: "Who was the previous owner of Ash's Charizard?", answers: { a: "Gary", b: "Professor Oak", c: "Professor Juniper", d: "Damian" }, correctAnswer: "d" },
				{ question: "What cat was Mew's character design based on?", answers: { a: "Scottish Fold", b: "Balinese", c: "Siamese", d: "Sphynx (Bingus)" }, correctAnswer: "d" },
				{ question: "How many Eeveelutions are there?", answers: { a: "8", b: "9", c: "5", d: "6" }, correctAnswer: "a" },
				{ question: "In Pokemon GO, what can you name your Eevee for it to evolve into an Espeon?", answers: { a: "Esper", b: "Sakura", c: "Tamao", d: "Mai" }, correctAnswer: "b" }
			];

			const quizContainer = document.getElementById('quiz');
			const resultsContainer = document.getElementById('results');
			const previousButton = document.getElementById('previous');
			const nextButton = document.getElementById('next');
			const submitButton = document.getElementById('submit');
			const progressText = document.getElementById('progressText');
			const progressFill = document.getElementById('progressFill');

			function buildQuiz() {
				const out = myQuestions.map((q, qi) => {
					const answers = Object.entries(q.answers).map(([letter, text]) => `
						<label class="answer">
							<input type="radio" name="question${qi}" value="${letter}">
							<span class="answer-letter">${letter.toUpperCase()}</span>
							<span class="answer-text">${text}</span>
						</label>
					`).join('');
					return `
						<div class="slide" data-index="${qi}">
							<div class="question-num">Question ${qi + 1} of ${myQuestions.length}</div>
							<div class="question">${q.question}</div>
							<div class="answers">${answers}</div>
						</div>
					`;
				}).join('');
				quizContainer.innerHTML = out;
			}

			function updateProgress() {
				progressText.textContent = `${currentSlide + 1} / ${myQuestions.length}`;
				progressFill.style.width = `${((currentSlide + 1) / myQuestions.length) * 100}%`;
			}

			function showSlide(n) {
				slides[currentSlide].classList.remove('active-slide');
				slides[n].classList.add('active-slide');
				currentSlide = n;

				previousButton.style.display = currentSlide === 0 ? 'none' : 'inline-flex';
				if (currentSlide === slides.length - 1) {
					nextButton.style.display = 'none';
					submitButton.style.display = 'inline-flex';
				} else {
					nextButton.style.display = 'inline-flex';
					submitButton.style.display = 'none';
				}
				updateProgress();
				quizContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
			}

			function showResults() {
				const answerContainers = quizContainer.querySelectorAll('.answers');
				let numCorrect = 0;

				myQuestions.forEach((q, qi) => {
					const container = answerContainers[qi];
					const selected = container.querySelector(`input[name=question${qi}]:checked`);
					const userAnswer = selected ? selected.value : null;
					const correct = q.correctAnswer;

					container.querySelectorAll('.answer').forEach(label => {
						const val = label.querySelector('input').value;
						if (val === correct) label.classList.add('is-correct');
						if (val === userAnswer && val !== correct) label.classList.add('is-wrong');
					});

					if (userAnswer === correct) numCorrect++;
				});

				const pct = Math.round((numCorrect / myQuestions.length) * 100);
				resultsContainer.hidden = false;
				resultsContainer.innerHTML = `
					<h2>Quiz Complete!</h2>
					<div class="score">
						<span class="score-num">${numCorrect}</span>
						<span class="score-denom"> / ${myQuestions.length}</span>
					</div>
					<div class="score-pct">${pct}% Correct</div>
					<p>Nice run, ${escapeHtml(playerName)}. Your score has been saved to the leaderboard.</p>
					<div class="results-actions">
						<a href="ranking.html" class="btn">View Leaderboard &rarr;</a>
						<a href="play.html" class="btn btn-secondary">Play Again</a>
					</div>
				`;

				sessionStorage.setItem('playerScore', String(numCorrect));
				saveToLeaderboard(playerName, numCorrect);

				submitButton.disabled = true;
				submitButton.style.display = 'none';
				previousButton.style.display = 'none';
				resultsContainer.scrollIntoView({ behavior: 'smooth' });
			}

			function saveToLeaderboard(name, score) {
				try {
					const key = 'pokequiz_leaderboard';
					const list = JSON.parse(localStorage.getItem(key) || '[]');
					list.push({ name, score, total: myQuestions.length, at: Date.now() });
					list.sort((a, b) => b.score - a.score || a.at - b.at);
					localStorage.setItem(key, JSON.stringify(list.slice(0, 50)));
				} catch (e) { /* localStorage unavailable */ }

				fetch('/api/leaderboard', {
					method: 'POST',
					headers: { 'content-type': 'application/json' },
					body: JSON.stringify({ name, score, total: myQuestions.length }),
				}).catch(() => { /* offline or backend unavailable */ });
			}

			buildQuiz();
			const slides = document.querySelectorAll('.slide');
			let currentSlide = 0;
			showSlide(0);

			submitButton.addEventListener('click', showResults);
			previousButton.addEventListener('click', () => showSlide(currentSlide - 1));
			nextButton.addEventListener('click', () => showSlide(currentSlide + 1));
		})();
	</script>
</body>
</html>
