<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Leaderboard &middot; PokeQuiz</title>
	<meta name="author" content="Angelo Miguel G. Vinluan">
	<link rel="icon" type="image/png" href="Pictures/pokeball.png">
	<meta name="description" content="The PokeQuiz global leaderboard — top trainers across every game mode.">
	<meta property="og:type" content="website">
	<meta property="og:site_name" content="PokeQuiz">
	<meta property="og:title" content="Leaderboard — PokeQuiz">
	<meta property="og:description" content="The PokeQuiz global leaderboard — top trainers across every game mode.">
	<meta property="og:image" content="https://poke-quiz-chi.vercel.app/Pictures/pokeball.png">
	<meta property="og:url" content="https://poke-quiz-chi.vercel.app/ranking">
	<meta name="twitter:card" content="summary">
	<meta name="twitter:title" content="Leaderboard — PokeQuiz">
	<meta name="twitter:description" content="The PokeQuiz global leaderboard — top trainers across every game mode.">
	<meta name="twitter:image" content="https://poke-quiz-chi.vercel.app/Pictures/pokeball.png">
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#ee1515">

</head>
<body>
	<header class="site-header">
		<a href="index.html" class="brand-link"><h1 class="brand">PokeQuiz</h1></a>
		<nav>
			<a href="index.html">Home</a>
			<a href="play.html">Play</a>
			<a href="quizzes.html">Quizzes</a>
			<a href="puzzle.html">Puzzles</a>
			<a href="ranking.html" class="active">Leaderboard</a>
			<a href="camp.html">Camp</a>
		</nav>
		<div class="profile-wrap">
			<button class="profile-btn" aria-haspopup="true" aria-expanded="false" type="button">
				<img class="profile-avatar" src="Pictures/pokeball.png" alt="">
				<span class="profile-name">Trainer</span>
			</button>
			<div class="profile-panel" hidden role="dialog" aria-label="Trainer profile">
				<div class="pp-title">Trainer Profile</div>
				<div class="pp-row">
					<span class="pp-row-label">Name</span>
					<span class="pp-name-view">&mdash;</span>
				</div>
				<div class="pp-row">
					<span class="pp-row-label">Best Score</span>
					<span class="pp-score-view">&mdash;</span>
				</div>
				<div class="pp-edit-form" hidden>
					<input class="pp-input" type="text" maxlength="24" placeholder="Your name">
					<button class="pp-mini-btn pp-save-btn" type="button">Save</button>
					<button class="pp-mini-btn pp-secondary pp-cancel-btn" type="button">Cancel</button>
				</div>
				<div class="pp-actions">
					<button class="pp-edit-btn" type="button">Edit Name</button>
					<button class="pp-clear-btn" type="button">Clear Data</button>
				</div>
			</div>
		</div>
	</header>

	<main class="container">
		<section class="card ranking-card">
			<div class="ranking-bg" aria-hidden="true">
				<img class="ranking-pokeball" src="Pictures/pokeball.png" alt="">
			</div>
			<div class="ranking-header">
				<div>
					<div class="eyebrow">
						<span class="dot"></span>
						<span id="eyebrowLabel">Hall of Fame</span>
					</div>
					<h1 id="boardTitle">Top 50 Scores</h1>
					<p class="lede" id="boardSubtitle">Loading scores&hellip;</p>
				</div>
			</div>

			<div class="lb-tabs" role="tablist">
				<button type="button" class="lb-tab is-active" data-game="quiz" role="tab" aria-selected="true">
					<span class="lb-tab-icon">🧠</span>
					<span class="lb-tab-label">Trivia Quiz</span>
				</button>
				<button type="button" class="lb-tab" data-game="silhouette" role="tab" aria-selected="false">
					<span class="lb-tab-icon">👤</span>
					<span class="lb-tab-label">Who's That Pokémon?</span>
				</button>
				<button type="button" class="lb-tab" data-game="cry" role="tab" aria-selected="false">
					<span class="lb-tab-icon">🔊</span>
					<span class="lb-tab-label">Cry Quiz</span>
				</button>
				<button type="button" class="lb-tab" data-game="higherlower" role="tab" aria-selected="false">
					<span class="lb-tab-icon">⚖️</span>
					<span class="lb-tab-label">Higher or Lower</span>
				</button>
				<button type="button" class="lb-tab" data-game="memory" role="tab" aria-selected="false">
					<span class="lb-tab-icon">🎴</span>
					<span class="lb-tab-label">Memory Match</span>
				</button>
				<button type="button" class="lb-tab" data-game="zoom" role="tab" aria-selected="false">
					<span class="lb-tab-icon">🔎</span>
					<span class="lb-tab-label">Zoomed-In</span>
				</button>
				<button type="button" class="lb-tab" data-game="dex" role="tab" aria-selected="false">
					<span class="lb-tab-icon">📖</span>
					<span class="lb-tab-label">Pokédex Entry</span>
				</button>
				<button type="button" class="lb-tab" data-game="type" role="tab" aria-selected="false">
					<span class="lb-tab-icon">🧪</span>
					<span class="lb-tab-label">Type Chart</span>
				</button>
				<button type="button" class="lb-tab" data-game="stats" role="tab" aria-selected="false">
					<span class="lb-tab-icon">📊</span>
					<span class="lb-tab-label">Stat Spread</span>
				</button>
				<button type="button" class="lb-tab" data-game="sprint" role="tab" aria-selected="false">
					<span class="lb-tab-icon">⏱️</span>
					<span class="lb-tab-label">Gen Sprint</span>
				</button>
				<button type="button" class="lb-tab" data-game="infinite" role="tab" aria-selected="false">
					<span class="lb-tab-icon">♾️</span>
					<span class="lb-tab-label">Infinite Trivia</span>
				</button>
				<button type="button" class="lb-tab" data-game="wordle" role="tab" aria-selected="false">
					<span class="lb-tab-icon">🟩</span>
					<span class="lb-tab-label">Pokédle</span>
				</button>
				<button type="button" class="lb-tab" data-game="connections" role="tab" aria-selected="false">
					<span class="lb-tab-icon">🔗</span>
					<span class="lb-tab-label">Connections</span>
				</button>
				<button type="button" class="lb-tab" data-game="ability" role="tab" aria-selected="false">
					<span class="lb-tab-icon">✨</span>
					<span class="lb-tab-label">Ability Guesser</span>
				</button>
				<button type="button" class="lb-tab" data-game="moveset" role="tab" aria-selected="false">
					<span class="lb-tab-icon">⚔️</span>
					<span class="lb-tab-label">Moveset Guesser</span>
				</button>
				<button type="button" class="lb-tab" data-game="spotlight" role="tab" aria-selected="false">
					<span class="lb-tab-icon">🌟</span>
					<span class="lb-tab-label">Daily Spotlight</span>
				</button>
				<button type="button" class="lb-tab" data-game="team" role="tab" aria-selected="false">
					<span class="lb-tab-icon">🛡️</span>
					<span class="lb-tab-label">Counter Team</span>
				</button>
			</div>

			<div id="modeTabs" class="lb-mode-tabs" hidden></div>

			<div class="leaderboard-wrap" id="lbPanel" role="tabpanel" aria-label="Leaderboard scores">
				<table class="leaderboard" id="leaderboard">
					<thead>
						<tr>
							<th class="col-rank">#</th>
							<th class="col-name">Trainer</th>
							<th class="col-score" id="colScoreLabel">Score</th>
							<th class="col-date">Date</th>
						</tr>
					</thead>
					<tbody id="leaderboardBody"></tbody>
				</table>
				<div id="emptyState" class="empty-state" hidden>
					<img src="Pictures/pokeball.png" alt="" width="64">
					<p id="emptyMsg">No scores yet for this game. Be the first.</p>
				</div>
				<div id="loadingState" class="empty-state">
					<p>Loading global scores&hellip;</p>
				</div>
			</div>

			<div class="ranking-actions">
				<a href="puzzle.html" class="btn">Puzzle Hub &rarr;</a>
				<a href="index.html" class="btn btn-secondary">Home</a>
			</div>
		</section>
	</main>

	<footer>Made with care by Angelo Miguel G. Vinluan</footer>

	<script src="js/util.js" defer></script>
	<script src="js/profile.js" defer></script>
	<script src="js/games-config.js"></script>
	<script>
		(function() {
			// Canonical leaderboard game config — see js/games-config.js.
			const GAMES = window.POKEQUIZ_GAMES;

			const tabsEl = document.querySelectorAll('.lb-tab');
			const modeTabsEl = document.getElementById('modeTabs');
			const body = document.getElementById('leaderboardBody');
			const emptyState = document.getElementById('emptyState');
			const emptyMsg = document.getElementById('emptyMsg');
			const loadingState = document.getElementById('loadingState');
			const table = document.getElementById('leaderboard');
			const eyebrowLabel = document.getElementById('eyebrowLabel');
			const boardTitle = document.getElementById('boardTitle');
			const subtitle = document.getElementById('boardSubtitle');
			const colScoreLabel = document.getElementById('colScoreLabel');

			let activeGame = 'quiz';
			let activeMode = '';   // '' = all modes

			function fmtTime(ms) {
				const totalSec = Math.floor(ms / 1000);
				const m = Math.floor(totalSec / 60);
				const s = totalSec % 60;
				return `${m}:${String(s).padStart(2, '0')}`;
			}

			function formatDate(ts) {
				const d = new Date(ts);
				return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
			}

			function escapeHtml(s) {
				return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
			}

			function formatMode(game, mode) {
				if (game === 'memory') {
					return ({ '6': 'Easy', '8': 'Medium', '12': 'Hard' })[mode] || mode;
				}
				if (game === 'silhouette' || game === 'cry' || game === 'zoom' || game === 'dex') {
					return mode.charAt(0).toUpperCase() + mode.slice(1);
				}
				if (game === 'higherlower') {
					return ({ weight: 'Weight', height: 'Height', hp: 'HP', atk: 'Attack', spd: 'Speed', random: 'Random' })[mode] || mode;
				}
				if (game === 'type') {
					return ({ mono: 'Mono-type', dual: 'Dual-type', random: 'Random' })[mode] || mode;
				}
				if (game === 'stats') {
					return ({ easy: 'Easy', medium: 'Medium', hard: 'Hard' })[mode] || mode;
				}
				if (game === 'sprint') {
					return ({ '30': '30s', '60': '60s', '120': '2 min' })[mode] || mode;
				}
				return mode;
			}

			let myName = '';
			try { myName = localStorage.getItem('playerName') || sessionStorage.getItem('playerName') || ''; } catch {}

			function getMyEeveeForm() {
				try {
					const inv = JSON.parse(localStorage.getItem('pokequiz_inventory') || '{}');
					const form = inv?.partner?.form || inv?.cosmetics?.eeveeForm || '';
					const FORM_EMOJI = {
						vaporeon: '💧', jolteon: '⚡', flareon: '🔥', espeon: '🔮',
						umbreon: '🌙', leafeon: '🍃', glaceon: '❄️', sylveon: '🎀', eevee: '🦊'
					};
					return FORM_EMOJI[form] || '';
				} catch { return ''; }
			}

			function renderRows(entries) {
				const cfg = GAMES[activeGame];
				colScoreLabel.textContent = cfg.scoreLabel;
				body.innerHTML = '';
				if (!entries.length) {
					table.hidden = true;
					emptyState.hidden = false;
					const modeLabel = activeMode
						? ` · ${formatMode(activeGame, activeMode)}`
						: '';
					emptyMsg.textContent = `No scores yet for ${cfg.label}${modeLabel}. Be the first.`;
					return;
				}
				table.hidden = false;
				emptyState.hidden = true;
				const eeveeEmoji = getMyEeveeForm();
				body.innerHTML = entries.map((e, i) => {
					const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
					let scoreDisplay;
					if (cfg.timeBased) {
						scoreDisplay = `<strong>${fmtTime(e.score)}</strong>`;
					} else if (activeGame === 'quiz') {
						scoreDisplay = `<strong>${e.score}</strong><span class="of">/ ${e.total || cfg.defaultTotal}</span>`;
					} else {
						scoreDisplay = `<strong>${e.score}</strong>`;
					}
					const isMe = myName && e.name === myName;
					const nameDisplay = isMe
						? `${escapeHtml(e.name)} ${eeveeEmoji ? eeveeEmoji + ' ' : ''}<span class="lb-you-badge">You</span>`
						: escapeHtml(e.name);
					return `
						<tr class="rank-${Math.min(i + 1, 4)}${isMe ? ' lb-my-row' : ''}">
							<td class="col-rank">${medal}</td>
							<td class="col-name">${nameDisplay}</td>
							<td class="col-score">${scoreDisplay}</td>
							<td class="col-date">${formatDate(e.at)}</td>
						</tr>
					`;
				}).join('');
			}

			function buildModeTabs(game) {
				const cfg = GAMES[game];
				modeTabsEl.innerHTML = '';
				if (!cfg.modes) {
					modeTabsEl.hidden = true;
					return;
				}
				modeTabsEl.hidden = false;
				modeTabsEl.setAttribute('role', 'tablist');
				modeTabsEl.setAttribute('aria-label', 'Game mode');

				// One tab per mode — no "All" tab. Keyboard: roving tabindex + arrows.
				cfg.modes.forEach(({ key, label }, idx) => {
					const btn = document.createElement('button');
					btn.type = 'button';
					const isActive = activeMode === key;
					btn.className = 'lb-mode-tab' + (isActive ? ' is-active' : '');
					btn.dataset.mode = key;
					btn.textContent = label;
					btn.setAttribute('role', 'tab');
					btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
					btn.setAttribute('aria-controls', 'lbPanel');
					btn.tabIndex = isActive ? 0 : -1;
					btn.addEventListener('click', () => selectMode(key));
					btn.addEventListener('keydown', (e) => {
						const tabs = [...modeTabsEl.querySelectorAll('.lb-mode-tab')];
						let n = -1;
						if (e.key === 'ArrowRight' || e.key === 'ArrowDown') n = (idx + 1) % tabs.length;
						else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') n = (idx - 1 + tabs.length) % tabs.length;
						else if (e.key === 'Home') n = 0;
						else if (e.key === 'End') n = tabs.length - 1;
						else return;
						e.preventDefault();
						tabs[n].focus();
						selectMode(tabs[n].dataset.mode);
					});
					modeTabsEl.appendChild(btn);
				});
			}

			async function loadBoard(game, mode) {
				let url = `/api/leaderboard?game=${encodeURIComponent(game)}&limit=50`;
				if (mode) url += `&mode=${encodeURIComponent(mode)}`;
				const res = await fetch(url);
				if (!res.ok) throw new Error('http ' + res.status);
				const data = await res.json();
				if (!Array.isArray(data.entries)) throw new Error('bad payload');
				return data.entries;
			}

			async function loadAndRender(game, mode) {
				const cfg = GAMES[game];
				loadingState.hidden = false;
				emptyState.hidden = true;
				table.hidden = true;
				try {
					const entries = await loadBoard(game, mode);
					loadingState.hidden = true;
					const modeLabel = mode ? ` · ${formatMode(game, mode)}` : '';
					boardTitle.textContent = `Top 50 · ${cfg.label}${modeLabel}`;
					eyebrowLabel.textContent = 'Global Hall of Fame';
					subtitle.textContent = cfg.timeBased
						? 'Fastest times across every trainer worldwide. Lower is better.'
						: 'Highest streaks across every trainer worldwide.';
					renderRows(entries);
				} catch {
					loadingState.hidden = true;
					eyebrowLabel.textContent = 'Backend Offline';
					subtitle.textContent = 'Could not load global scores. Try again in a moment.';
					renderRows([]);
				}
			}

			async function selectMode(mode) {
				activeMode = mode;
				// Sync active state on mode tabs
				modeTabsEl.querySelectorAll('.lb-mode-tab').forEach((b) => {
					const active = b.dataset.mode === mode;
					b.classList.toggle('is-active', active);
					b.setAttribute('aria-selected', active ? 'true' : 'false');
					b.tabIndex = active ? 0 : -1;
				});
				await loadAndRender(activeGame, mode);
			}

			async function selectGame(game) {
				activeGame = game;
				// Default to first mode for games that have modes
				const cfg = GAMES[game];
				activeMode = cfg.modes ? cfg.modes[0].key : '';
				tabsEl.forEach((t) => {
					const active = t.dataset.game === game;
					t.classList.toggle('is-active', active);
					t.setAttribute('aria-selected', active ? 'true' : 'false');
					// Roving tabindex: only the selected tab is in the tab order.
					t.tabIndex = active ? 0 : -1;
				});
				buildModeTabs(game);
				await loadAndRender(game, activeMode);
			}

			// Wire game tabs as a proper ARIA tablist: click + roving
			// arrow-key navigation, each tab controlling the shared panel.
			tabsEl.forEach((t, i) => {
				t.id = 'lbtab-' + t.dataset.game;
				t.setAttribute('aria-controls', 'lbPanel');
				t.addEventListener('click', () => selectGame(t.dataset.game));
				t.addEventListener('keydown', (e) => {
					let next = -1;
					if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next = (i + 1) % tabsEl.length;
					else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') next = (i - 1 + tabsEl.length) % tabsEl.length;
					else if (e.key === 'Home') next = 0;
					else if (e.key === 'End') next = tabsEl.length - 1;
					else return;
					e.preventDefault();
					const target = tabsEl[next];
					target.focus();
					selectGame(target.dataset.game);
				});
			});

			// Initial load
			selectGame('quiz');
		})();
	</script>
</body>
</html>
