<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Leaderboard &middot; PokeQuiz</title>
	<meta name="author" content="Angelo Miguel G. Vinluan">
	<link rel="icon" type="image/png" href="Pictures/pokeball.png">
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/ranking.css">
</head>
<body>
	<header class="site-header">
		<a href="index.html" class="brand-link"><h1 class="brand">PokeQuiz</h1></a>
		<nav>
			<a href="index.html">Home</a>
			<a href="play.html">Play</a>
			<a href="puzzle.html">Puzzles</a>
			<a href="ranking.html" class="active">Leaderboard</a>
			<a href="camp.html">Camp</a>
		</nav>
		<div class="profile-wrap">
			<button class="profile-btn" aria-haspopup="true" aria-expanded="false" type="button">
				<img class="profile-avatar" src="Pictures/pokeball.png" alt="">
				<span class="profile-name">Trainer</span>
			</button>
			<div class="profile-panel" hidden role="dialog" aria-label="Trainer profile">
				<div class="pp-title">Trainer Profile</div>
				<div class="pp-row">
					<span class="pp-row-label">Name</span>
					<span class="pp-name-view">&mdash;</span>
				</div>
				<div class="pp-row">
					<span class="pp-row-label">Best Score</span>
					<span class="pp-score-view">&mdash;</span>
				</div>
				<div class="pp-edit-form" hidden>
					<input class="pp-input" type="text" maxlength="24" placeholder="Your name">
					<button class="pp-mini-btn pp-save-btn" type="button">Save</button>
					<button class="pp-mini-btn pp-secondary pp-cancel-btn" type="button">Cancel</button>
				</div>
				<div class="pp-actions">
					<button class="pp-edit-btn" type="button">Edit Name</button>
					<button class="pp-clear-btn" type="button">Clear Data</button>
				</div>
			</div>
		</div>
	</header>

	<main class="container">
		<section class="card ranking-card">
			<div class="ranking-bg" aria-hidden="true">
				<img class="ranking-pokeball" src="Pictures/pokeball.png" alt="">
			</div>
			<div class="ranking-header">
				<div>
					<div class="eyebrow">
						<span class="dot"></span>
						<span id="eyebrowLabel">Hall of Fame</span>
					</div>
					<h1 id="boardTitle">Top 50 Scores</h1>
					<p class="lede" id="boardSubtitle">Loading scores&hellip;</p>
				</div>
			</div>

			<div class="lb-tabs" role="tablist">
				<button type="button" class="lb-tab is-active" data-game="quiz" role="tab" aria-selected="true">
					<span class="lb-tab-icon">🧠</span>
					<span class="lb-tab-label">Trivia Quiz</span>
				</button>
				<button type="button" class="lb-tab" data-game="silhouette" role="tab" aria-selected="false">
					<span class="lb-tab-icon">👤</span>
					<span class="lb-tab-label">Who's That Pokémon?</span>
				</button>
				<button type="button" class="lb-tab" data-game="cry" role="tab" aria-selected="false">
					<span class="lb-tab-icon">🔊</span>
					<span class="lb-tab-label">Cry Quiz</span>
				</button>
				<button type="button" class="lb-tab" data-game="higherlower" role="tab" aria-selected="false">
					<span class="lb-tab-icon">⚖️</span>
					<span class="lb-tab-label">Higher or Lower</span>
				</button>
				<button type="button" class="lb-tab" data-game="memory" role="tab" aria-selected="false">
					<span class="lb-tab-icon">🎴</span>
					<span class="lb-tab-label">Memory Match</span>
				</button>
			</div>

			<div id="modeTabs" class="lb-mode-tabs" hidden></div>

			<div class="leaderboard-wrap">
				<table class="leaderboard" id="leaderboard">
					<thead>
						<tr>
							<th class="col-rank">#</th>
							<th class="col-name">Trainer</th>
							<th class="col-score" id="colScoreLabel">Score</th>
							<th class="col-mode">Mode</th>
							<th class="col-date">Date</th>
						</tr>
					</thead>
					<tbody id="leaderboardBody"></tbody>
				</table>
				<div id="emptyState" class="empty-state" hidden>
					<img src="Pictures/pokeball.png" alt="" width="64">
					<p id="emptyMsg">No scores yet for this game. Be the first.</p>
				</div>
				<div id="loadingState" class="empty-state">
					<p>Loading global scores&hellip;</p>
				</div>
			</div>

			<div class="ranking-actions">
				<a href="puzzle.html" class="btn">Puzzle Hub &rarr;</a>
				<a href="index.html" class="btn btn-secondary">Home</a>
			</div>
		</section>
	</main>

	<footer>Made with care by Angelo Miguel G. Vinluan</footer>

	<script src="js/profile.js" defer></script>
	<script>
		(function() {
			const GAMES = {
				quiz: {
					label: 'Trivia Quiz', scoreLabel: 'Score', defaultTotal: 21, timeBased: false,
					modes: null,
				},
				silhouette: {
					label: "Who's That Pokémon?", scoreLabel: 'Streak', timeBased: false,
					modes: [
						{ key: 'casual',   label: 'Casual' },
						{ key: 'standard', label: 'Standard' },
						{ key: 'hardcore', label: 'Hardcore' },
					],
				},
				cry: {
					label: 'Cry Quiz', scoreLabel: 'Streak', timeBased: false,
					modes: [
						{ key: 'casual',   label: 'Casual' },
						{ key: 'standard', label: 'Standard' },
						{ key: 'hardcore', label: 'Hardcore' },
					],
				},
				higherlower: {
					label: 'Higher or Lower', scoreLabel: 'Streak', timeBased: false,
					modes: [
						{ key: 'weight', label: 'Weight' },
						{ key: 'height', label: 'Height' },
						{ key: 'hp',     label: 'HP' },
						{ key: 'atk',    label: 'Attack' },
						{ key: 'spd',    label: 'Speed' },
						{ key: 'random', label: 'Random' },
					],
				},
				memory: {
					label: 'Memory Match', scoreLabel: 'Time', timeBased: true,
					modes: [
						{ key: '6',  label: 'Easy (6 pairs)' },
						{ key: '8',  label: 'Medium (8 pairs)' },
						{ key: '12', label: 'Hard (12 pairs)' },
					],
				},
			};

			const tabsEl = document.querySelectorAll('.lb-tab');
			const modeTabsEl = document.getElementById('modeTabs');
			const body = document.getElementById('leaderboardBody');
			const emptyState = document.getElementById('emptyState');
			const emptyMsg = document.getElementById('emptyMsg');
			const loadingState = document.getElementById('loadingState');
			const table = document.getElementById('leaderboard');
			const eyebrowLabel = document.getElementById('eyebrowLabel');
			const boardTitle = document.getElementById('boardTitle');
			const subtitle = document.getElementById('boardSubtitle');
			const colScoreLabel = document.getElementById('colScoreLabel');

			let activeGame = 'quiz';
			let activeMode = '';   // '' = all modes

			function fmtTime(ms) {
				const totalSec = Math.floor(ms / 1000);
				const m = Math.floor(totalSec / 60);
				const s = totalSec % 60;
				return `${m}:${String(s).padStart(2, '0')}`;
			}

			function formatDate(ts) {
				const d = new Date(ts);
				return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
			}

			function escapeHtml(s) {
				return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
			}

			function formatMode(game, mode) {
				if (game === 'memory') {
					return ({ '6': 'Easy', '8': 'Medium', '12': 'Hard' })[mode] || mode;
				}
				if (game === 'silhouette' || game === 'cry') {
					return mode.charAt(0).toUpperCase() + mode.slice(1);
				}
				if (game === 'higherlower') {
					return ({ weight: 'Weight', height: 'Height', hp: 'HP', atk: 'Attack', spd: 'Speed', random: 'Random' })[mode] || mode;
				}
				return mode;
			}

			function renderRows(entries) {
				const cfg = GAMES[activeGame];
				colScoreLabel.textContent = cfg.scoreLabel;
				body.innerHTML = '';
				if (!entries.length) {
					table.hidden = true;
					emptyState.hidden = false;
					const modeLabel = activeMode
						? ` · ${formatMode(activeGame, activeMode)}`
						: '';
					emptyMsg.textContent = `No scores yet for ${cfg.label}${modeLabel}. Be the first.`;
					return;
				}
				table.hidden = false;
				emptyState.hidden = true;
				body.innerHTML = entries.map((e, i) => {
					const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
					let scoreDisplay;
					if (cfg.timeBased) {
						scoreDisplay = `<strong>${fmtTime(e.score)}</strong>`;
					} else if (activeGame === 'quiz') {
						scoreDisplay = `<strong>${e.score}</strong><span class="of">/ ${e.total || cfg.defaultTotal}</span>`;
					} else {
						scoreDisplay = `<strong>${e.score}</strong>`;
					}
					// Mode column is always hidden — every board is mode-specific now.
					const modeDisplay = '';
					return `
						<tr class="rank-${Math.min(i + 1, 4)}">
							<td class="col-rank">${medal}</td>
							<td class="col-name">${escapeHtml(e.name)}</td>
							<td class="col-score">${scoreDisplay}</td>
							<td class="col-mode">${modeDisplay}</td>
							<td class="col-date">${formatDate(e.at)}</td>
						</tr>
					`;
				}).join('');
			}

			function buildModeTabs(game) {
				const cfg = GAMES[game];
				modeTabsEl.innerHTML = '';
				if (!cfg.modes) {
					modeTabsEl.hidden = true;
					return;
				}
				modeTabsEl.hidden = false;

				// One tab per mode — no "All" tab
				cfg.modes.forEach(({ key, label }) => {
					const btn = document.createElement('button');
					btn.type = 'button';
					btn.className = 'lb-mode-tab' + (activeMode === key ? ' is-active' : '');
					btn.dataset.mode = key;
					btn.textContent = label;
					btn.addEventListener('click', () => selectMode(key));
					modeTabsEl.appendChild(btn);
				});
			}

			async function loadBoard(game, mode) {
				let url = `/api/leaderboard?game=${encodeURIComponent(game)}&limit=50`;
				if (mode) url += `&mode=${encodeURIComponent(mode)}`;
				const res = await fetch(url);
				if (!res.ok) throw new Error('http ' + res.status);
				const data = await res.json();
				if (!Array.isArray(data.entries)) throw new Error('bad payload');
				return data.entries;
			}

			async function loadAndRender(game, mode) {
				const cfg = GAMES[game];
				loadingState.hidden = false;
				emptyState.hidden = true;
				table.hidden = true;
				try {
					const entries = await loadBoard(game, mode);
					loadingState.hidden = true;
					const modeLabel = mode ? ` · ${formatMode(game, mode)}` : '';
					boardTitle.textContent = `Top 50 · ${cfg.label}${modeLabel}`;
					eyebrowLabel.textContent = 'Global Hall of Fame';
					subtitle.textContent = cfg.timeBased
						? 'Fastest times across every trainer worldwide. Lower is better.'
						: 'Highest streaks across every trainer worldwide.';
					renderRows(entries);
				} catch {
					loadingState.hidden = true;
					eyebrowLabel.textContent = 'Backend Offline';
					subtitle.textContent = 'Could not load global scores. Try again in a moment.';
					renderRows([]);
				}
			}

			async function selectMode(mode) {
				activeMode = mode;
				// Sync active state on mode tabs
				modeTabsEl.querySelectorAll('.lb-mode-tab').forEach((b) => {
					b.classList.toggle('is-active', b.dataset.mode === mode);
				});
				await loadAndRender(activeGame, mode);
			}

			async function selectGame(game) {
				activeGame = game;
				// Default to first mode for games that have modes
				const cfg = GAMES[game];
				activeMode = cfg.modes ? cfg.modes[0].key : '';
				tabsEl.forEach((t) => {
					const active = t.dataset.game === game;
					t.classList.toggle('is-active', active);
					t.setAttribute('aria-selected', active ? 'true' : 'false');
				});
				buildModeTabs(game);
				await loadAndRender(game, activeMode);
			}

			tabsEl.forEach((t) => t.addEventListener('click', () => selectGame(t.dataset.game)));

			// Initial load
			selectGame('quiz');
		})();
	</script>
</body>
</html>
