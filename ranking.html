<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Leaderboard &middot; PokeQuiz</title>
	<meta name="author" content="Angelo Miguel G. Vinluan">
	<link rel="icon" type="image/png" href="Pictures/pokeball.png">
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/ranking.css">
</head>
<body>
	<header class="site-header">
		<a href="index.html" class="brand-link"><h1 class="brand">PokeQuiz</h1></a>
		<nav>
			<a href="index.html">Home</a>
			<a href="play.html">Play</a>
			<a href="ranking.html" class="active">Leaderboard</a>
		</nav>
	</header>

	<main class="container">
		<section class="card ranking-card">
			<div class="ranking-bg" aria-hidden="true">
				<img class="ranking-pokeball" src="Pictures/pokeball.png" alt="">
			</div>
			<div class="ranking-header">
				<div>
					<div class="eyebrow">
						<span class="dot"></span>
						<span id="eyebrowLabel">Hall of Fame</span>
					</div>
					<h1>Top 10 Scores</h1>
					<p class="lede" id="boardSubtitle">Loading scores&hellip;</p>
				</div>
				<button id="clearBoard" type="button" class="btn btn-ghost" hidden>Clear Local</button>
			</div>

			<div class="leaderboard-wrap">
				<table class="leaderboard" id="leaderboard">
					<thead>
						<tr>
							<th class="col-rank">#</th>
							<th class="col-name">Trainer</th>
							<th class="col-score">Score</th>
							<th class="col-date">Date</th>
						</tr>
					</thead>
					<tbody id="leaderboardBody"></tbody>
				</table>
				<div id="emptyState" class="empty-state" hidden>
					<img src="Pictures/pokeball.png" alt="" width="64">
					<p>No scores yet. <a href="play.html">Take the quiz</a> to claim the top spot!</p>
				</div>
			</div>

			<div class="ranking-actions">
				<a href="play.html" class="btn">Play Again &rarr;</a>
				<a href="index.html" class="btn btn-secondary">Home</a>
			</div>
		</section>
	</main>

	<footer>Made with care by Angelo Miguel G. Vinluan</footer>

	<script>
		(function() {
			const LOCAL_KEY = 'pokequiz_leaderboard';
			const body = document.getElementById('leaderboardBody');
			const emptyState = document.getElementById('emptyState');
			const table = document.getElementById('leaderboard');
			const clearBtn = document.getElementById('clearBoard');
			const eyebrowLabel = document.getElementById('eyebrowLabel');
			const subtitle = document.getElementById('boardSubtitle');

			function formatDate(ts) {
				const d = new Date(ts);
				return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
			}

			function escape(s) {
				return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
			}

			function getLocalList() {
				let list = [];
				try { list = JSON.parse(localStorage.getItem(LOCAL_KEY) || '[]'); } catch (e) {}
				const sessName = sessionStorage.getItem('playerName');
				const sessScore = sessionStorage.getItem('playerScore');
				if (sessName && sessScore !== null && !list.some(e => e.name === sessName && String(e.score) === sessScore)) {
					list.push({ name: sessName, score: Number(sessScore), total: 21, at: Date.now() });
				}
				list.sort((a, b) => b.score - a.score || a.at - b.at);
				return list;
			}

			function renderRows(top) {
				if (!top.length) {
					table.hidden = true;
					emptyState.hidden = false;
					return;
				}
				table.hidden = false;
				emptyState.hidden = true;
				body.innerHTML = top.map((e, i) => {
					const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
					return `
						<tr class="rank-${i + 1}">
							<td class="col-rank">${medal}</td>
							<td class="col-name">${escape(e.name)}</td>
							<td class="col-score"><strong>${e.score}</strong><span class="of">/ ${e.total || 21}</span></td>
							<td class="col-date">${formatDate(e.at)}</td>
						</tr>
					`;
				}).join('');
			}

			async function loadGlobal() {
				const res = await fetch('/api/leaderboard', { headers: { accept: 'application/json' } });
				if (!res.ok) throw new Error('http ' + res.status);
				const data = await res.json();
				if (!Array.isArray(data.entries)) throw new Error('bad payload');
				return data.entries;
			}

			async function render() {
				try {
					const top = await loadGlobal();
					eyebrowLabel.textContent = 'Global Hall of Fame';
					subtitle.textContent = 'Live scores from every trainer worldwide.';
					clearBtn.hidden = true;
					renderRows(top.slice(0, 10));
				} catch (err) {
					eyebrowLabel.textContent = 'Local Hall of Fame';
					subtitle.textContent = 'Backend offline — showing scores from this browser.';
					clearBtn.hidden = false;
					renderRows(getLocalList().slice(0, 10));
				}
			}

			clearBtn.addEventListener('click', () => {
				if (confirm('Clear the local leaderboard? This only affects this browser; global scores stay.')) {
					localStorage.removeItem(LOCAL_KEY);
					sessionStorage.removeItem('playerScore');
					render();
				}
			});

			render();
		})();
	</script>
</body>
</html>
